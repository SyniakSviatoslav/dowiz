name: CI

# Post "drop js" (2026-07-15): the JS/TS frontend + pnpm stack were removed.
# The surviving testable surface is the self-contained bash telemetry bridge.
# This CI proves it runs its local self-test (no network / no secret needed).

on:
  push:
    branches: [ "main", "feat/kernel-fsm-graph-analysis" ]
  pull_request:
    branches: [ "main" ]
  # P45-W0 §4b.1: recurring security scan. A RUSTSEC advisory published between
  # pushes is currently invisible until the next commit; a daily scheduled run
  # catches it within 24h. Both security-class jobs below gain a failure alert.
  schedule:
    - cron: "17 3 * * *"   # daily 03:17 UTC, off-peak

jobs:
  telemetry-selftest:
    name: telemetry bridge self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run telemetry self-test (local-only, no Telegram secret)
        run: |
          cd tools/telemetry
          chmod +x *.sh
          bash selftest-telemetry.sh
      - name: Smoke-test the Markov health signal (uses loop-signals)
        run: |
          cd tools/telemetry
          printf 'edit\nrun_fail\nedit\nrun_fail\nedit\nrun_fail\nedit\nrun_fail\n' \
            | TELEMETRY_NO_TG=1 ./telemetry health

  eqc-proofs:
    name: eqc math proofs (dowiz tools/eqc-rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test (compiles + runs each generated proof program via rustc)
        run: |
          cd tools/eqc-rs
          cargo test --release

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # reader can never misread a red CI run as a limit on hub autonomy.
  claim-latency-ledger:
    name: claim-latency ledger (V5-B appender)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Append one JSONL entry per new commit (appender only; anomaly consumer = Phase 8)
        run: cargo run --offline --manifest-path tools/ci-truth/Cargo.toml -- claim-latency
      - name: Publish the ledger as a CI artifact (avoids a bot commit-back loop)
        uses: actions/upload-artifact@v4
        with:
          name: claim-latency-ledger
          path: docs/ledger/claim-latency.jsonl
          if-no-files-found: warn

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # reader can never misread a red CI run as a limit on hub autonomy.
  v5c-reexec:
    name: v5c independent re-execution (S6/V5-C, UNSIGNED)
    runs-on: ubuntu-latest
    # Red-line gate (blueprint `if: red-line paths touched`) is enforced INSIDE
    # the native `ci-truth v5c-reexec` binary: it inspects the diff range and emits
    # verdict SKIP (exit 0) when no money.rs/order_machine.rs/event_log.rs/auth path
    # is touched, running the full independent re-exec only when one is. UNSIGNED
    # here — Phase 6 wraps this same runner with ML-DSA key_K/key_V signatures on top.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates so the offline re-exec has its deps (no vendoring yet)
        run: |
          cargo fetch --manifest-path kernel/Cargo.toml
          cargo fetch --manifest-path engine/Cargo.toml
      - name: Re-execute the diff range in a clean independent worktree (RED|GREEN|SKIP)
        run: cargo run --offline --manifest-path tools/ci-truth/Cargo.toml -- v5c-reexec origin/main HEAD

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # reader can never misread a red CI run as a limit on hub autonomy.
  # P01 CI-Truth Floor (BLUEPRINT-P01 §2.1): runs kernel + engine suites --offline, NO `if:` path
  # filter — this job is unconditional so a planted assert!(false) in any kernel test goes RED on
  # every push/PR, not only when red-line paths change. Requires the vendoring decision so CI has no
  # network.
  cargo-test:
    name: cargo test (kernel + engine, offline, unconditional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline (no network in CI — see BLUEPRINT-P01 §2.1)
        run: |
          cargo fetch --manifest-path kernel/Cargo.toml
          cargo fetch --manifest-path engine/Cargo.toml
      - name: Run kernel test suite (offline)
        run: cargo test --offline --manifest-path kernel/Cargo.toml
      - name: Run engine test suite (offline)
        run: cargo test --offline --manifest-path engine/Cargo.toml

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P-H W-H3 (BLUEPRINT-P-H-ops-telemetry §2.1): bench-regression gate. Runs the
  # autotrack mechanism (benches/bench_track.py) on every push/PR so a silent
  # hot-path degrade (or a benchmark added without a baseline entry) goes RED.
  # Deterministic kernel benches only — see AGENTS.md ceiling note: harness/LLM
  # benches stay probes (pass/fail), NOT baseline-gated (host/noisy variance).
  bench-regression:
    name: bench regression (kernel hot paths, baseline-gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline (no network in CI — see P01 §2.1)
        run: cargo fetch --manifest-path kernel/Cargo.toml
      - name: Run kernel criterion benches + compare against committed baseline
        run: |
          cd kernel
          python3 benches/bench_track.py --threshold 10
      - name: Upload bench history on regression (trend artifact, no commit-back loop)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history
          path: kernel/benches/BENCH_HISTORY.md
          if-no-files-found: warn

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.2 (BLUEPRINT-P01): recover the gitleaks gate dropped in f9ab28ff1. Points at the existing
  # .gitleaks.toml. --exit-code 1 makes a planted secret RED (acceptance §4.1).
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan history + working tree for secrets
        id: scan
        run: gitleaks detect --config .gitleaks.toml --redact --exit-code 1
      - name: Page S0 on secret leak (P45-W0 §4b.1)
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPS_ALERTS_TOPIC: ${{ secrets.OPS_ALERTS_TOPIC }}
        run: |
          curl -sS --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "message_thread_id=${OPS_ALERTS_TOPIC}" \
            --data-urlencode "text=🔴 S0 gitleaks: secret detected in ${{ github.repository }}@${{ github.sha }} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null || true

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.3 (BLUEPRINT-P01): makes CONTRIBUTING.md:17 TRUE. Every commit in the PR
  # range (origin/main..HEAD) must carry a `Signed-off-by:` trailer (acceptance §4.4/§4.10).
  dco-check:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require Signed-off-by on every commit
        run: |
          rc=0
          for sha in $(git rev-list origin/main..HEAD); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::$sha missing Signed-off-by trailer"
              rc=1
            fi
          done
          exit $rc

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.4 (BLUEPRINT-P01): supply-chain gate. cargo-audit (advisories) + cargo-deny
  # (licenses/bans/sources, deny.toml cloned from bebop pattern) + zero-OCI check.
  # Named `supply-chain` so scripts/check-zero-oci.sh:8 references a real job.
  supply-chain:
    name: supply-chain (audit + deny + zero-oci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline
        run: |
          cargo fetch --manifest-path kernel/Cargo.toml
          cargo fetch --manifest-path engine/Cargo.toml
      - name: cargo audit (RUSTSEC advisories)
        run: cargo audit
      - name: cargo deny check (licenses / bans / sources)
        run: |
          cargo deny --manifest-path kernel/Cargo.toml check
          cargo deny --manifest-path engine/Cargo.toml check
      - name: zero-OCI base-image check (DK-08)
        run: bash scripts/check-zero-oci.sh
      - name: Page S1 on supply-chain finding (P45-W0 §4b.1)
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPS_ALERTS_TOPIC: ${{ secrets.OPS_ALERTS_TOPIC }}
        run: |
          curl -sS --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "message_thread_id=${OPS_ALERTS_TOPIC}" \
            --data-urlencode "text=🟠 S1 supply-chain: audit/deny/zero-oci finding in ${{ github.repository }}@${{ github.sha }} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null || true

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.5 (BLUEPRINT-P01): a new dependency without a DECART report / marker => RED.
  decart-dep-lint:
    name: decart dependency lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint new dependencies for DECART justification
        run: bash scripts/decart-dep-lint.sh origin/main HEAD

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.6 (BLUEPRINT-P01, E58): dowiz-side wire of the NO-COURIER-SCORING red-line.
  # A reputation/scoring identifier in kernel/engine/tools fails the build.
  no-courier-scoring:
    name: no courier scoring (E58)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject courier reputation/scoring identifiers
        run: |
          ! git grep -nEi 'courier[_-]?(score|rating|reputation|rank)' -- \
            'kernel/**' 'engine/**' 'tools/**' ':!**/*NO-COURIER-SCORING*'
