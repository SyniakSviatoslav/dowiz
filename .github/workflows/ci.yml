name: CI

# NOTE (2026-07-13, MANIFESTO/DECISIONS D1): the legacy centralized `deploy`
# job (Fly + migrate:up against the Supabase/postgres revenue stack) is RETIRED.
# MANIFESTO D1 / DECISIONS D1 mandate: "Drop the centralized server — no server
# process, no central DB, no Supabase, no Fly." The revenue stack was quarantined
# to attic/ (apps/api, apps/worker, packages/db) and its pnpm scripts
# (migrate:up, verify:migrations, verify:rls) were removed, so those CI steps can
# no longer succeed. Backend delivery now runs on decentralized Rust/WASM peer
# nodes, NOT this repo's CI-to-Fly pipeline.
#
# The only live gate here is `validate`: it proves THIS repo (frontend SPA +
# governance math core) builds, typechecks, lints, passes the privacy/compliance
# gates, and that the governance deterministic-core tests are GREEN (not faked).
# The `fresh-provision` job is also retired — it exercised the deleted
# Postgres/API stack.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build
        run: pnpm -r build
        
      - name: Typecheck
        run: pnpm -r typecheck
        
      - name: Lint
        run: pnpm lint
        
      - name: Lint Gates
        run: pnpm lint:gates

      - name: Governance math-core tests (RED+GREEN, no fake-green)
        run: pnpm test:governance

      - name: Verify no secrets in repo
        run: pnpm verify:secrets
        
      - name: Compliance gate (privacy-invariants)
        run: pnpm compliance:gate
