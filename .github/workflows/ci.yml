name: CI

# Post "drop js" (2026-07-15): the JS/TS frontend + pnpm stack were removed.
# The surviving testable surface is the self-contained bash telemetry bridge.
# This CI proves it runs its local self-test (no network / no secret needed).

on:
  push:
    branches: [ "main", "feat/kernel-fsm-graph-analysis" ]
  pull_request:
    branches: [ "main" ]
  # P45-W0 §4b.1: recurring security scan. A RUSTSEC advisory published between
  # pushes is currently invisible until the next commit; a daily scheduled run
  # catches it within 24h. Both security-class jobs below gain a failure alert.
  schedule:
    - cron: "17 3 * * *"   # daily 03:17 UTC, off-peak

jobs:
  telemetry-selftest:
    name: telemetry bridge self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run telemetry self-test (local-only, no Telegram secret)
        run: |
          cd tools/telemetry
          chmod +x *.sh
          bash selftest-telemetry.sh
      - name: Smoke-test the Markov health signal (uses loop-signals)
        run: |
          cd tools/telemetry
          # `telemetry health` depends on tools/loop-signals/markov_attractor.py, which is
          # NOT committed to the repo (the loop-signals health model lives only in the
          # operator's local working tree). On a clean checkout the file is absent and the
          # command hard-fails with exit 3, so skip it there — the self-test above stays the
          # always-verifiable gate (matches selftest-telemetry.sh's skip-when-absent pattern).
          if [ ! -f ../loop-signals/markov_attractor.py ]; then
            echo "telemetry health: tools/loop-signals/markov_attractor.py absent on clean checkout — skipping"
            exit 0
          fi
          printf 'edit\nrun_fail\nedit\nrun_fail\nedit\nrun_fail\nedit\nrun_fail\n' \
            | TELEMETRY_NO_TG=1 ./telemetry health

  eqc-proofs:
    name: eqc math proofs (dowiz tools/eqc-rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test (compiles + runs each generated proof program via rustc)
        run: |
          cd tools/eqc-rs
          cargo test --release

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # reader can never misread a red CI run as a limit on hub autonomy.
  claim-latency-ledger:
    name: claim-latency ledger (V5-B appender)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Append one JSONL entry per new commit (appender only; anomaly consumer = Phase 8)
        run: cargo run --offline --manifest-path tools/ci-truth/Cargo.toml -- claim-latency
      - name: Publish the ledger as a CI artifact (avoids a bot commit-back loop)
        uses: actions/upload-artifact@v4
        with:
          name: claim-latency-ledger
          path: docs/ledger/claim-latency.jsonl
          if-no-files-found: warn

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # reader can never misread a red CI run as a limit on hub autonomy.
  v5c-reexec:
    name: v5c independent re-execution (S6/V5-C, UNSIGNED)
    runs-on: ubuntu-latest
    # Red-line gate (blueprint `if: red-line paths touched`) is enforced INSIDE
    # the native `ci-truth v5c-reexec` binary: it inspects the diff range and emits
    # verdict SKIP (exit 0) when no money.rs/order_machine.rs/event_log.rs/auth path
    # is touched, running the full independent re-exec only when one is. UNSIGNED
    # here — Phase 6 wraps this same runner with ML-DSA key_K/key_V signatures on top.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline (per-crate cd; no workspace in dowiz)
        run: |
          cd kernel
          cargo fetch
          cd ../engine
          cargo fetch
      - name: Re-execute the diff range in a clean independent worktree (RED|GREEN|SKIP)
        run: cargo run --offline --manifest-path tools/ci-truth/Cargo.toml -- v5c-reexec origin/main HEAD

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # reader can never misread a red CI run as a limit on hub autonomy.
  # P01 CI-Truth Floor (BLUEPRINT-P01 §2.1): runs kernel + engine suites --offline, NO `if:` path
  # filter — this job is unconditional so a planted assert!(false) in any kernel test goes RED on
  # every push/PR, not only when red-line paths change.
  #
  # BUILD MODEL (CRITICAL): dowiz has NO root Cargo.toml / workspace. We MUST `cd` into each crate
  # dir and run `cargo test` there. We do NOT use `cargo -p` / `cargo --manifest-path` from the repo
  # root — there is no workspace, so `--manifest-path` from root resolves the manifest but still
  # pulls the wrong target graph and masks failures as exit-0 (a FALSE-GREEN trap). Each step runs
  # `cargo test` with its real exit code (no `| tail`, no `--no-fail-fast`) so a failing test FAILS
  # THE BUILD.
  cargo-test:
    name: cargo test (kernel + engine, offline, unconditional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run kernel test suite (per-crate cd)
        run: |
          cd kernel
          cargo fetch
          cargo test --offline
      - name: Run engine test suite (per-crate cd)
        run: |
          cd engine
          cargo fetch
          cargo test --offline

  # ### SCOPE RULE BANNER (read before anything else — ARCHITECTURE.md §0, lines 23–27)
  # **Everything in this phase is a canonical-repo DEV-TIME fence.** It is a blocking CI / pre-commit
  # control on *the operator's own build and merge into the canonical repo* — it is **NOT** a runtime
  # control over any autonomous hub. At runtime every hub is a sovereign Hydra (M5/M9/M11): it may
  # fork this repo, delete these workflows, self-gate locally via `eqc`, ignore the upstream gate, and
  # replicate-or-reject any artifact. **No gate in this blueprint may be read as a "global control."**
  # Where a job header says "blocks merge", it means *blocks merge into the canonical repo*, nothing more.
  # This banner is reproduced verbatim in the header of every workflow job this phase adds, so a future
  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P-H W-H3 (BLUEPRINT-P-H-ops-telemetry §2.1): bench-regression gate. Runs the
  # autotrack mechanism (benches/bench_track.py) on every push/PR so a silent
  # hot-path degrade (or a benchmark added without a baseline entry) goes RED.
  # Deterministic kernel benches only — see AGENTS.md ceiling note: harness/LLM
  # benches stay probes (pass/fail), NOT baseline-gated (host/noisy variance).
  bench-regression:
    name: bench regression (kernel hot paths, baseline-gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline (no network in CI — see P01 §2.1)
        run: cargo fetch --manifest-path kernel/Cargo.toml
      - name: Run kernel criterion benches + fail-closed A/B regression gate
        run: |
          cd kernel
          python3 benches/bench_track.py --ci --threshold 10
      - name: Upload bench trend on regression (trend artifact, no commit-back loop)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bench-trend
          path: kernel/benches/bench_trend.json
          if-no-files-found: warn

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.2 (BLUEPRINT-P01): recover the gitleaks gate dropped in f9ab28ff1. Points at the existing
  # .gitleaks.toml. --exit-code 1 makes a planted secret RED (acceptance §4.1).
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan history + working tree for secrets
        id: scan
        run: gitleaks detect --config .gitleaks.toml --redact --exit-code 1
      - name: Page S0 on secret leak (P45-W0 §4b.1)
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPS_ALERTS_TOPIC: ${{ secrets.OPS_ALERTS_TOPIC }}
        run: |
          curl -sS --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "message_thread_id=${OPS_ALERTS_TOPIC}" \
            --data-urlencode "text=🔴 S0 gitleaks: secret detected in ${{ github.repository }}@${{ github.sha }} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null || true

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.3 (BLUEPRINT-P01): makes CONTRIBUTING.md:17 TRUE. Every commit in the PR
  # range (origin/main..HEAD) must carry a `Signed-off-by:` trailer (acceptance §4.4/§4.10).
  dco-check:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require Signed-off-by on every commit
        run: |
          rc=0
          for sha in $(git rev-list origin/main..HEAD); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::$sha missing Signed-off-by trailer"
              rc=1
            fi
          done
          exit $rc

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.4 (BLUEPRINT-P01): supply-chain gate. cargo-audit (advisories) + cargo-deny
  # (licenses/bans/sources, deny.toml cloned from bebop pattern) + zero-OCI check.
  # Named `supply-chain` so scripts/check-zero-oci.sh:8 references a real job.
  supply-chain:
    name: supply-chain (audit + deny + zero-oci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline
        run: |
          cargo fetch --manifest-path kernel/Cargo.toml
          cargo fetch --manifest-path engine/Cargo.toml
      - name: cargo audit (RUSTSEC advisories)
        run: cargo audit
      - name: cargo deny check (licenses / bans / sources)
        run: |
          cargo deny --manifest-path kernel/Cargo.toml check
          cargo deny --manifest-path engine/Cargo.toml check
      - name: zero-OCI base-image check (DK-08)
        run: bash scripts/check-zero-oci.sh
      - name: Page S1 on supply-chain finding (P45-W0 §4b.1)
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPS_ALERTS_TOPIC: ${{ secrets.OPS_ALERTS_TOPIC }}
        run: |
          curl -sS --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "message_thread_id=${OPS_ALERTS_TOPIC}" \
            --data-urlencode "text=🟠 S1 supply-chain: audit/deny/zero-oci finding in ${{ github.repository }}@${{ github.sha }} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null || true

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # Roadmap items 1+13 + item 31 (SPACE-GRADE-KERNEL-EXECUTION-ROADMAP-2026-07-19 §B/§C/§G.7):
  # for EACH crate in scripts/zero-dep-crates.txt, its default no-dev dependency tree must be a
  # subset of <crate>/ZERO-DEP-ALLOWLIST.txt, each allowlist may only shrink vs origin/main, the
  # verdict is computed with networking disabled (unshare -n), and each <crate>/Cargo.lock must be
  # byte-identical after the check (item 13 / §10-P6). One job, one loop — cargo tree is
  # metadata-only, the whole roster runs in seconds. EXCLUSIONS (item 31 §2.5): agent-governance-wasm
  # (absolute-path bebop dep, CI-unresolvable) and mesh-adapter (dual-checkout — gated in its own job).
  zero-dep-gate:
    name: per-crate zero-dep gate (items 1+13+31)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for the origin/main allowlist comparison (Gate B)
      - name: Pre-fetch crate metadata for the whole roster (networked, before the offline gate)
        run: |
          grep -vE '^\s*(#|$)' scripts/zero-dep-crates.txt | while read -r c; do
            echo "== fetch $c =="
            cargo fetch --locked --manifest-path "$c/Cargo.toml"
          done
      - name: Zero-dep gate (offline, no-network namespace) — looped over the roster
        run: |
          sudo -E env "PATH=$PATH" unshare -n bash -c '
            set -euo pipefail
            grep -vE "^[[:space:]]*(#|$)" scripts/zero-dep-crates.txt | while read -r c; do
              bash scripts/zero-dep-gate.sh "$c" </dev/null
            done
          '

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.5 (BLUEPRINT-P01): a new dependency without a DECART report / marker => RED.
  decart-dep-lint:
    name: decart dependency lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint new dependencies for DECART justification
        run: bash scripts/decart-dep-lint.sh origin/main HEAD

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P01 §2.6 (BLUEPRINT-P01, E58): dowiz-side wire of the NO-COURIER-SCORING red-line.
  # A reputation/scoring identifier in kernel/engine/tools fails the build.
  no-courier-scoring:
    name: no courier scoring (E58)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject courier reputation/scoring identifiers
        run: |
          ! git grep -nEi 'courier[_-]?(score|rating|reputation|rank)' -- \
            'kernel/**' 'engine/**' 'tools/**' ':!**/*NO-COURIER-SCORING*'

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # BLUEPRINT-P-B §5 note-4 (WAVE F): compile-time backstop for the
  # normalize-before-hash invariant (§3.2). `matrix_content_address` was
  # demoted to private so the ONLY content-address path for a tile is
  # `NormalizedTile::content_address` (canonical form). If it is ever
  # re-promoted to `pub`, this grep gate goes RED — silently re-opening the
  # raw-bits hash hazard the type system closed. The drift-gate
  # `RetainedBase::admit` already calls the private fn internally; no other
  # module may reach it.
  no-pub-raw-matrix-hash:
    name: spectral invariant grep gate (P-B §5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assert matrix_content_address is NOT pub in kernel/src
        run: |
          if git grep -nE 'pub fn matrix_content_address' -- 'kernel/src/**'; then
            echo "::error::matrix_content_address re-promoted to pub — violates BLUEPRINT-P-B §3.2/§5"
            exit 1
          fi
          echo "OK: matrix_content_address is private (raw-matrix hash demoted)"
  # P45-W0 §4b.2: declarative security fences (tools/ops-alert/fences.toml) enforced by
  # the fence-check binary. A tripped must-never assertion (BYPASSRLS in a live migration,
  # insecure-tls default feature, a dead pager) is S0 => RED merge. fence_count guards
  # against a fence being silently deleted (weakening-guardrail class).
  fence-check:
    name: security fences (P45-W0 §4b.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce fences.toml must-never assertions
        run: cargo run --offline --manifest-path tools/ops-alert/Cargo.toml --bin fence-check

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P45-W0 §4c.2: regression-digest drift gate. The committed REGRESSION-DIGEST.md is a
  # generated VIEW of REGRESSION-LEDGER.md; --check regenerates and fails if the committed
  # copy is stale or hand-edited (same regenerate-and-diff pattern as the codegen gate).
  regression-digest:
    name: regression digest drift (P45-W0 §4c.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify committed digest matches the ledger
        run: cargo run --offline --manifest-path tools/ops-alert/Cargo.toml --bin regression-digest -- --check

  # P40 compile-firewall gate (fix-wave: makes the audit's "DeadProbe" RED-able).
  # The agent-loop crate MUST NOT DIRECTLY depend on dowiz-kernel — all kernel
  # access goes through agent-facade (transitive kernel use is fine). The
  # roadmap falsifier ("cargo tree shows the loop crate does not import
  # dowiz-kernel directly") is satisfied today, but it could silently regress;
  # this job turns that into a hard RED gate. We check the manifest for a
  # DIRECT dependency edge (not cargo tree, which shows the legitimate
  # transitive kernel pull through agent-facade) so the gate is precise and
  # RED-able: add `dowiz-kernel = ...` to agent-loop/Cargo.toml and CI fails.
  firewall-agent-loop:
    name: agent-loop kernel firewall (P40)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if agent-loop directly depends on dowiz-kernel
        run: |
          if grep -Eq '^[[:space:]]*dowiz-kernel[[:space:]]*=' agent-loop/Cargo.toml; then
            echo "FIREWALL BREACH: agent-loop must not depend on dowiz-kernel directly (use agent-facade)" >&2
            exit 1
          fi
          echo "OK: agent-loop firewall intact (no direct dowiz-kernel dependency)"

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # P34 (BLUEPRINT-P34-mesh-kernel-wiring.md §3.1c): the cross-repo anti-rot
  # ratchet. Gates BOTH directions of the dowiz<->bebop feature build:
  #  - REVERSE edge (the one that rotted, E0004): bebop-delivery-domain --features kernel-rlib
  #  - FORWARD edge (DoD-1): dowiz-mesh-adapter cargo test
  #  - W-6 firewall red-proof: a build that MUST fail if proto-wire links the kernel
  # Sibling checkout layout mirrors /root so relative path deps resolve
  # (adapter ../../bebop-repo/..., delivery-domain ../../../dowiz/kernel).
  mesh-adapter:
    name: mesh-adapter (P34 dowiz<->bebop wiring, kernel-rlib gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: dowiz }
      - uses: actions/checkout@v4
        with:
          repository: SyniakSviatoslav/OpenBebop
          ref: 986646a35258ced76752510625511f37a6367a77   # = OPENBEBOP_CI_PIN; bump = reviewed commit
          path: bebop-repo
      # Gate the REVERSE edge (the one that rotted, §0 row 12):
      - run: cargo test --manifest-path bebop-repo/Cargo.toml -p bebop-delivery-domain --features kernel-rlib
      # Gate the FORWARD edge (DoD-1) + the whole P34 suite:
      - run: cargo test --manifest-path dowiz/mesh-adapter/Cargo.toml
      # Firewall red-proof (W-6): a build that MUST fail, §3.6:
      - run: bash dowiz/mesh-adapter/proofs/firewall-red.sh bebop-repo
      # item 31 §2.5: the per-crate zero-dep gate for mesh-adapter rides THIS dual-checkout job —
      # its relative ../../bebop-repo path deps resolve only in this layout, so it is excluded from
      # the roster loop. Its external set is empty (path deps only); the gate freezes that floor.
      # cwd = dowiz/ so scripts/ + the origin/main (Gate B) comparison resolve from the dowiz tree.
      - name: Zero-dep gate (mesh-adapter)
        working-directory: dowiz
        run: |
          cargo fetch --locked --manifest-path mesh-adapter/Cargo.toml
          bash scripts/zero-dep-gate.sh mesh-adapter </dev/null

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # ITEM 14 (space-grade roadmap §B / §G.8): structural compiler-bump trigger.
  # The compiler is a pinned, audited input (rust-toolchain.toml `channel`).
  # This job ALWAYS runs (so it is safe to mark as a required status check —
  # a `paths:`-filtered workflow would deadlock non-bump PRs, §3.1). Its
  # enforcement branch fires ONLY when the pinned `channel` value changed vs the
  # comparison base; a bump then REQUIRES docs/audits/toolchain/spot-check-<new>.md
  # in the same diff (introducing the pin itself counts as <absent> -> 1.96.1).
  # Design + red→green proof: docs/design/BLUEPRINT-ITEM-14-toolchain-pin-2026-07-19.md §3.
  toolchain-bump-gate:
    name: toolchain-bump gate (spot-check artifact required on bump)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect channel bump; require spot-check artifact
        run: |
          set -euo pipefail
          FILE=rust-toolchain.toml
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          else
            BASE="${{ github.event.before }}"
            case "$BASE" in
              0000000000000000000000000000000000000000|"") BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "") ;;
            esac
          fi
          head_channel=$(grep -oP '^channel\s*=\s*"\K[^"]+' "$FILE")
          base_channel=""
          if [ -n "$BASE" ] && git cat-file -e "$BASE:$FILE" 2>/dev/null; then
            base_channel=$(git show "$BASE:$FILE" | grep -oP '^channel\s*=\s*"\K[^"]+' || true)
          fi
          if [ "$head_channel" = "$base_channel" ]; then
            echo "no toolchain bump ($head_channel unchanged) — gate vacuously green"
            exit 0
          fi
          echo "TOOLCHAIN BUMP DETECTED: '${base_channel:-<absent>}' -> '$head_channel'"
          ART="docs/audits/toolchain/spot-check-$head_channel.md"
          [ -f "$ART" ] || { echo "::error::bump to $head_channel without $ART"; exit 1; }
          grep -q "$head_channel" "$ART" \
            || { echo "::error::$ART does not name $head_channel"; exit 1; }
          grep -q '^## Assembly spot-check' "$ART" \
            || { echo "::error::$ART missing '## Assembly spot-check'"; exit 1; }
          grep -q '^## Full-suite re-run' "$ART" \
            || { echo "::error::$ART missing '## Full-suite re-run'"; exit 1; }
          echo "bump to $head_channel accompanied by $ART — gate green"

  # ### SCOPE RULE BANNER (verbatim — see cargo-test job header above)
  # ITEM 6 (space-grade roadmap §C / SYNTHESIS §4 + §10-P7): the hardening-checklist gate.
  # ALWAYS runs (no `paths:` filter, so it is safe as a required status check — a filtered
  # workflow would deadlock non-hot-path PRs, §3.1). The gate re-EXECUTES, never presence-checks
  # (§10-P7): every verdict is a live `cargo test` exit code plus the PARSED "N passed" count
  # asserted >= the manifest's min_tests. A filter matching ZERO tests is RED — the anti-forgery
  # core. It (B) fails a diff touching a hot ZONE with no manifest row, (C) re-runs each touched
  # row's oracle, (D) UNCONDITIONALLY re-runs every oracle row every build (a deleted oracle goes
  # RED on the next run) — this notably re-executes the pq-gated ACVP/Keccak/x25519/KEM KATs, which
  # the default `cargo test --offline` does NOT compile (pq is not a default feature), and
  # (E) runs the dudect gate incl. its planted-leak self-test in release. Determinism (P6):
  # every cargo call is --locked --offline; kernel/Cargo.lock hash asserted unchanged.
  # Standing law: docs/audits/hardening/CHECKLIST.md; manifest: docs/audits/hardening/HOT-PATHS.tsv.
  # Design + red→green proof: docs/design/BLUEPRINT-ITEM-06-hardening-checklist-ci-2026-07-19.md.
  hardening-gate:
    name: hardening checklist gate (item 6, re-execute not presence-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-fetch crates offline (default + pq feature set for the oracle floor)
        run: |
          cd kernel
          cargo fetch --locked
          cargo fetch --locked --features pq
      - name: Re-execute the §4 hardening checklist (diff-trigger + oracle floor + dudect)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          else
            BASE="${{ github.event.before }}"
            case "$BASE" in
              0000000000000000000000000000000000000000|"") BASE=$(git rev-parse HEAD~1 2>/dev/null || echo HEAD) ;;
            esac
          fi
          bash scripts/hardening-gate.sh "$BASE" HEAD

  # ITEM 7 (space-grade roadmap §C / SYNTHESIS §7): the Kani bounded-model-checker gate.
  # SEPARATE job from hardening-gate (blueprint §6.1): Kani is a NETWORK-installed toolchain
  # (its own rustc + CBMC, `cargo install kani-verifier && cargo kani setup`) with minutes-scale
  # proof times — folding it into the fast `--locked --offline` hardening-gate would break that
  # gate's offline determinism and per-PR bite. Runs the `mode=kani` rows of the SHARED manifest
  # (docs/audits/hardening/HOT-PATHS.tsv) via scripts/kani-gate.sh: every verdict is a live
  # `cargo kani` run + the parsed "N successfully verified harnesses" asserted >= the manifest
  # min (a filter matching ZERO harnesses is RED — the anti-forgery core). Includes the
  # planted-fault self-test (kernel/src/kani_selftest.rs): a deliberate i32 overflow annotated
  # #[kani::should_panic] that verifies SUCCESSFUL only because the fault IS caught — proving the
  # gate detects real bugs, not passing vacuously. ZERO-DEP stays mechanically true: all harnesses
  # are behind #[cfg(kani)]; the `kani` API crate is injected by `cargo kani` only under cfg(kani),
  # so NOTHING is added to Cargo.toml/Cargo.lock (`cargo tree -e no-dev` unchanged; items 1/13/31).
  # Design + RED-path demonstration: docs/design/BLUEPRINT-ITEM-07-kani-wiring-2026-07-19.md §6.5.
  kani-gate:
    name: kani proof gate (item 7, bounded model checking)
    runs-on: ubuntu-latest
    env:
      KANI_VERSION: "0.67.0"   # pinned; CBMC verdicts are deterministic per version, only runtime varies
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cache Kani toolchain (~/.kani bundle) + cargo bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.kani
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
          key: kani-${{ env.KANI_VERSION }}-${{ runner.os }}
      - name: Install Kani (network toolchain — same class as rustup; offline discipline governs crate deps, not toolchains)
        run: |
          set -euo pipefail
          if ! command -v cargo-kani >/dev/null 2>&1; then
            cargo install kani-verifier --locked --version "${KANI_VERSION}"
          fi
          cargo kani setup   # idempotent — no-op when the pinned bundle is already present (cache hit)
          cargo kani --version
      - name: Run the kani-gate (mode=kani manifest rows + planted-fault self-test)
        run: bash scripts/kani-gate.sh

