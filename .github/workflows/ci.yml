name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd kernel && cargo test --lib
      - run: cd engine && cargo test --lib
      - run: cd apps/courier && cargo test

  mutations:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-mutants
      - run: cd kernel && cargo mutants --in-package dowiz-kernel --file src/trinary.rs --file src/eigen.rs --file src/pid.rs --file src/numerical_guard.rs --file src/delta.rs --timeout 30

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - run: cd kernel && for target in fuzz_trinary fuzz_eigen fuzz_sanitize; do timeout 60 cargo fuzz run $target -- -max_total_time=30; done
