<!DOCTYPE html>
<html lang="uk" data-theme="crimson">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>dowiz — Decentralized Delivery Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="src/styles/tokens.css"/>
<link rel="stylesheet" href="src/styles/base.css"/>
<link rel="stylesheet" href="src/styles/animations.css"/>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.172.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
  }
}
</script>
<style>
canvas#bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;min-height:100vh}
.hero{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 60px}
.hero h1{font-size:clamp(40px,8vw,80px);font-weight:700;letter-spacing:-2px;line-height:1.05;margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,var(--brand-primary),#ff6b35,var(--brand-primary-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(15px,2vw,20px);color:var(--brand-text-muted);max-width:560px;margin:0 auto 32px;line-height:1.6}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;background:rgba(234,79,22,.1);color:var(--brand-primary);margin-bottom:20px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
section{padding:80px 24px;max-width:1200px;margin:0 auto}
.section-title{font-size:clamp(26px,3.5vw,38px);font-weight:700;margin-bottom:8px}
.section-subtitle{font-size:15px;color:var(--brand-text-muted);margin-bottom:40px;max-width:480px}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:0}
.feature-card{padding:28px;border-radius:var(--brand-radius);background:var(--brand-surface);border:1px solid var(--brand-border);transition:all .4s cubic-bezier(.34,1.56,.64,1);cursor:default}
.feature-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--brand-primary)}
.feature-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;background:rgba(234,79,22,.1)}
.feature-card h3{font-size:17px;margin-bottom:6px}
.feature-card p{font-size:13px;color:var(--brand-text-muted);line-height:1.6}
.cat-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.menu-section{padding-top:40px}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.menu-item{background:var(--brand-surface);border:1px solid var(--brand-border);border-radius:var(--brand-radius);padding:16px;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.menu-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.menu-img{width:100%;height:120px;border-radius:6px;background:linear-gradient(135deg,rgba(234,79,22,.05),var(--brand-surface));margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:40px}
.menu-cat{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--brand-primary);font-weight:600;margin-bottom:3px}
.menu-item h4{font-size:15px;margin-bottom:3px}
.menu-desc{font-size:11px;color:var(--brand-text-muted);margin-bottom:10px;line-height:1.5}
.menu-footer{display:flex;justify-content:space-between;align-items:center}
.menu-price{font-weight:700;font-size:17px}
.orders-card{background:var(--brand-surface);border:1px solid var(--brand-border);border-radius:var(--brand-radius);padding:20px}
.order-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--brand-border)}
.order-row:last-child{border-bottom:none}
.order-id{font-weight:600;font-size:15px}
.order-meta{font-size:12px;color:var(--brand-text-muted);margin-top:2px}
.order-status{display:flex;align-items:center;gap:8px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.order-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
.order-badge.pending{background:#D97706;color:#fff}
.order-badge.confirmed{background:#2563EB;color:#fff}
.order-badge.preparing{background:#F59E0B;color:#000}
.order-badge.ready{background:#0D9488;color:#fff}
.order-badge.in-delivery{background:#3B82F6;color:#fff}
.order-badge.delivered{background:#059669;color:#fff}
.stats-grid,.test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:20px;margin-top:32px}
.stat-card,.test-card{text-align:center;padding:28px 16px;background:var(--brand-surface);border:1px solid var(--brand-border);border-radius:var(--brand-radius)}
.stat-number,.test-value{font-size:clamp(28px,4vw,42px);font-weight:700;background:linear-gradient(135deg,var(--brand-primary),var(--brand-primary-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label,.test-label{font-size:13px;color:var(--brand-text-muted);margin-top:4px}
.navbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(18,18,18,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--brand-border)}
.navbar-logo{font-family:var(--font-heading);font-size:22px;font-weight:700}
.navbar-links{display:flex;gap:28px}
.navbar-links a{color:var(--brand-text-muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;transition:color .2s;position:relative;cursor:pointer}
.navbar-links a:hover,.navbar-links a.active{color:var(--brand-text)}
.navbar-links a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--brand-primary);border-radius:1px}
.cart-panel{position:fixed;top:0;right:-400px;width:380px;height:100%;background:var(--brand-surface);border-left:1px solid var(--brand-border);z-index:200;transition:right .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-xl);display:flex;flex-direction:column;overflow-y:auto}
.cart-panel.open{right:0}
.cart-header{padding:20px;border-bottom:1px solid var(--brand-border);display:flex;justify-content:space-between;align-items:center}
.cart-items{flex:1;padding:12px 20px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--brand-border)}
.cart-total{padding:20px;border-top:1px solid var(--brand-border);display:flex;justify-content:space-between;font-size:17px;font-weight:700}
.cart-actions{padding:0 20px 20px}
.btn-remove{background:none;border:none;color:var(--color-danger);cursor:pointer;font-size:16px;padding:4px}
.btn-remove:hover{transform:scale(1.2)}
.theme-switcher{position:fixed;top:66px;right:24px;z-index:100;display:flex;gap:5px;padding:6px 10px;background:var(--brand-surface);border:1px solid var(--brand-border);border-radius:999px;backdrop-filter:blur(20px);box-shadow:var(--shadow-lg)}
.theme-dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.theme-dot:hover{transform:scale(1.3)}
.theme-dot.active{border-color:var(--brand-text);transform:scale(1.1)}
footer{padding:48px 24px 24px;text-align:center;border-top:1px solid var(--brand-border)}
footer p{color:var(--brand-text-muted);font-size:12px}
@media(max-width:768px){.navbar-links{display:none}.desktop-only{display:none!important}.cart-panel{width:100%}.hero{padding:100px 16px 40px}section{padding:40px 16px}}
.gradient-text{background:linear-gradient(135deg,var(--brand-primary),var(--brand-primary-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app"></div>
<div class="theme-switcher">
  <div class="theme-dot active" style="background:#ea4f16" onclick="App.setTheme('')" data-theme=""></div>
  <div class="theme-dot" style="background:#C1121F" onclick="App.setTheme('crimson')" data-theme="crimson"></div>
  <div class="theme-dot" style="background:#0D9488" onclick="App.setTheme('ocean')" data-theme="ocean"></div>
  <div class="theme-dot" style="background:#F97316" onclick="App.setTheme('midnight')" data-theme="midnight"></div>
  <div class="theme-dot" style="background:#4D7C0F" onclick="App.setTheme('sage')" data-theme="sage"></div>
  <div class="theme-dot" style="background:#B45309" onclick="App.setTheme('gold')" data-theme="gold"></div>
  <div class="theme-dot" style="background:#DB2777" onclick="App.setTheme('coral')" data-theme="coral"></div>
</div>
<script src="src/app.js"></script>
</body>
</html>
