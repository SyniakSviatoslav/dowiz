<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>dowiz — Field Interface</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.172.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;font-family:'DM Sans',sans-serif;overflow:hidden;color:#fff;height:100vh;width:100vw}
#field-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
/* ── Zero-DOM overlay: minimal chrome, everything else is SDF field ── */
.chrome{position:fixed;z-index:10;pointer-events:none;font-family:'DM Serif Display',serif}
.chrome *{pointer-events:auto}
.logo{top:24px;left:24px;font-size:22px;color:rgba(255,255,255,.9)}
.logo span{color:#C1121F}
.status{top:24px;right:24px;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.6)}
.dot{width:6px;height:6px;border-radius:50%;background:#10B981;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.role-switch{bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:4px}
.role-btn{background:none;border:none;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s}
.role-btn.active{background:rgba(193,18,31,.3);color:#fff}
.hud{position:fixed;z-index:10;pointer-events:none;font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,.4)}
.hud-left{bottom:96px;left:24px;line-height:1.8}
.hud-right{bottom:96px;right:24px;text-align:right;line-height:1.8}
.hud-right span{color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<canvas id="field-canvas"></canvas>

<div class="chrome logo">dowiz<span>.</span></div>
<div class="chrome status"><span class="dot"></span>Field Active · 60 fps</div>

<div class="chrome role-switch">
  <button class="role-btn active" data-role="customer">Customer</button>
  <button class="role-btn" data-role="owner">Owner</button>
  <button class="role-btn" data-role="courier">Courier</button>
</div>

<div class="hud hud-left" id="hud-left">
  <div>Neurons: <span id="neuron-count">0</span></div>
  <div>Spike rate: <span id="spike-rate">0</span> Hz</div>
</div>
<div class="hud hud-right" id="hud-right">
  <div>Orders: <span id="order-count">0</span></div>
  <div>Revenue: <span id="revenue">0</span></div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Field State ───
const state = {
  role: 'customer',
  neurons: [],
  orders: JSON.parse(localStorage.getItem('dowiz-orders') || '[]'),
  menu: [
    { id: 1, name: 'Margherita', price: 850, cat: 'pizza', emoji: '\u{1F355}' },
    { id: 2, name: 'Pepperoni', price: 950, cat: 'pizza', emoji: '\u{1F355}' },
    { id: 3, name: 'Formaggi', price: 1050, cat: 'pizza', emoji: '\u{1F9C0}' },
    { id: 4, name: 'Carbonara', price: 780, cat: 'pasta', emoji: '\u{1F35D}' },
  ],
  cart: [],
  spikeCount: 0,
  frameCount: 0
};

// ─── Three.js Neural Field ───
const canvas = document.getElementById('field-canvas');

const renderer = new THREE.WebGLRenderer({
  canvas, alpha: false, antialias: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0, 4);

// ── Izhikevich Neurons (2000) ──
const N = 2000;
const pos = new Float32Array(N * 3);
const colors = new Float32Array(N * 3);
const sizes = new Float32Array(N);
const v = new Float32Array(N);
const u = new Float32Array(N);

const c1 = new THREE.Color('#C1121F');
const c2 = new THREE.Color('#F97316');

for (let i = 0; i < N; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = Math.random() * 2.2;
  const phi = Math.random() * Math.PI - Math.PI / 2;
  pos[i*3] = Math.cos(theta) * r * Math.cos(phi);
  pos[i*3+1] = Math.sin(phi) * r * 0.8;
  pos[i*3+2] = Math.sin(theta) * r * Math.cos(phi);
  const mix = Math.random();
  const c = c1.clone().lerp(c2, mix);
  colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  sizes[i] = Math.random() * 0.06 + 0.02;
  v[i] = -65 + Math.random() * 10;
  u[i] = Math.random() * 10;
}
state.neurons = { pos, colors, sizes, v, u };

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const mat = new THREE.PointsMaterial({
  size: 0.04, vertexColors: true, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
});
const particles = new THREE.Points(geo, mat);
scene.add(particles);

// ── Connection lines ──
const linePositions = [];
for (let i = 0; i < N; i++) {
  for (let j = i + 1; j < N; j++) {
    const dist = Math.sqrt(
      (pos[i*3]-pos[j*3])**2 + (pos[i*3+1]-pos[j*3+1])**2 + (pos[i*3+2]-pos[j*3+2])**2
    );
    if (dist < 0.5 && Math.random() < 0.03) {
      linePositions.push(pos[i*3], pos[i*3+1], pos[i*3+2]);
      linePositions.push(pos[j*3], pos[j*3+1], pos[j*3+2]);
    }
  }
}
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
const lineMat = new THREE.LineBasicMaterial({
  color: 0xC1121F, transparent: true, opacity: 0.06, blending: THREE.AdditiveBlending
});
const lines = new THREE.LineSegments(lineGeo, lineMat);
scene.add(lines);

// ── Post-processing ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(canvas.width, canvas.height), 0.4, 0.3, 0.85
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ── Audio ──
let audioCtx = null;
function sonify() {
  if (!audioCtx) {
    const C = window.AudioContext || window.webkitAudioContext;
    if (!C) return;
    audioCtx = new C();
  }
  const pentatonic = [262, 294, 330, 392, 440, 524, 588, 660];
  const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

// ── Mouse interaction ──
const mouse = new THREE.Vector2(0, 0);
canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});
canvas.addEventListener('click', (e) => {
  sonify();
  // Add order on click
  if (state.role === 'customer') {
    const item = state.menu[Math.floor(Math.random() * state.menu.length)];
    const qty = Math.floor(Math.random() * 3) + 1;
    state.orders.push({
      id: Date.now() % 100000, item: item.name, qty,
      total: item.price * qty, date: new Date().toISOString()
    });
    localStorage.setItem('dowiz-orders', JSON.stringify(state.orders));
    updateHUD();
  }
});

// ── Resize ──
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = w; canvas.height = h;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  composer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

// ── HUD update ──
function updateHUD() {
  const revenue = state.orders.reduce((s, o) => s + o.total, 0);
  document.getElementById('neuron-count').textContent = N;
  document.getElementById('spike-rate').textContent = (state.spikeCount / 60).toFixed(1);
  document.getElementById('order-count').textContent = state.orders.length;
  document.getElementById('revenue').textContent = revenue.toLocaleString() + ' ALL';
}

// ── Role switching ──
document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.role = btn.dataset.role;
    // Change field color based on role
    const roleColors = {
      customer: new THREE.Color('#C1121F'),
      owner: new THREE.Color('#059669'),
      courier: new THREE.Color('#2563EB')
    };
    const c = roleColors[state.role] || roleColors.customer;
    bloom.strength = state.role === 'owner' ? 0.6 : 0.4;
    mat.color.set(c);
  });
});

// ── Animation loop ──
const clock = new THREE.Clock();
let spikeAccum = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  // Izhikevich update
  const p = pos, siz = sizes, vel = v, pot = u;
  let spikes = 0;

  for (let i = 0; i < N; i++) {
    const mx = mouse.x * 1.8, my = mouse.y * 1.2;
    const dx = p[i*3] - mx, dy = p[i*3+1] - my;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mouseI = Math.exp(-dist * dist * 3) * 8;
    const noise = (Math.sin(i * 12.9898 + t * 2.3) % 1) * 2 + 1;
    const I = 4 + noise + mouseI;

    vel[i] += dt * (0.04 * vel[i] * vel[i] + 5 * vel[i] + 140 - pot[i] + I);
    pot[i] += dt * 0.02 * (0.2 * vel[i] - pot[i]);

    if (vel[i] >= 30) {
      vel[i] = -65; pot[i] += 8; spikes++;
      siz[i] = 0.12;
    } else {
      siz[i] += (0.03 - siz[i]) * dt * 3;
    }

    // Gentle drift
    p[i*3] += Math.sin(t * 0.08 + i * 0.01) * dt * 0.008;
    p[i*3+1] += Math.cos(t * 0.08 + i * 0.01) * dt * 0.008;
  }

  state.spikeCount = spikes;
  spikeAccum += spikes;

  if (spikeAccum > 5) {
    sonify();
    spikeAccum = 0;
  }

  geo.attributes.position.needsUpdate = true;
  geo.attributes.size.needsUpdate = true;

  // Rotate
  particles.rotation.y += dt * 0.015;
  lines.rotation.y = particles.rotation.y;

  // Pulse lines
  lineMat.opacity = 0.03 + Math.sin(t * 0.8) * 0.03;

  updateHUD();
  composer.render();
}

animate();
updateHUD();
</script>
</body>
</html>
