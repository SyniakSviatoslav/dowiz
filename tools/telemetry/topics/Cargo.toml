[package]
name = "topics"
version = "0.1.0"
edition = "2021"

# Native port of tools/telemetry/topics.sh — Telegram topic aggregator.
# Pure std for git/log polling + `ureq` for the Telegram Bot API (network is
# inherent to the function). No langchain/typer/rich, no python subprocess.
[dependencies]
ureq = { version = "2", features = ["json"] }
serde_json = "1"
# `resources` subcommand: real IPC via the kernel's item-27 PMU station
# (fdr::pmu — hand-rolled perf_event_open(2), default kernel build, no features).
# The kernel's default feature set pulls ZERO external crates, so this adds no
# new third-party code to the dependency graph.
dowiz-kernel = { path = "../../../kernel" }

[[bin]]
name = "topics"
path = "src/main.rs"
