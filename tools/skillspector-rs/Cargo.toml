[package]
name = "skillspector-rs"
version = "0.1.0"
edition = "2021"

# Native port of tools/skillspector (NVIDIA Apache-2.0 security scanner).
# Replaces langchain/langgraph/typer/rich + yara-python with a pure-Rust
# deterministic static scanner + a stdio JSON-RPC `serve` mode.
#
# `rules.rs` is GENERATED by gen_rules.py from the upstream Python sources,
# so the regex set + DEFAULT_* metadata tables are mechanically identical
# (zero hand-transcription error). The engine (src/engine.rs) ports
# static_runner.run_static_patterns 1:1.
[dependencies]
regex = "1"
# serde + serde_json REMOVED (roadmap item 31 §4.4 Phase-A cutover): the JSON-RPC serve-mode parse
# and the findings/summary OUTPUT now go through the kernel-owned `dowiz_kernel::json` primitive
# (differentially proven vs serde_json — kernel/tests/json_oracle.rs). dowiz-kernel's DEFAULT build
# is zero-external-dep, so this adds NO transitive crates; `cargo tree -e no-dev` drops the whole
# serde subtree (serde/serde_json/serde_core/serde_derive/proc-macro2/quote/syn/unicode-ident/itoa/
# zmij) and this crate's allowlist shrinks to the regex subtree only.
# NOTE: `regex` remains a separate named rewrite candidate (synthesis §25) — out of item-31 scope.
dowiz-kernel = { path = "../../kernel" }

[[bin]]
name = "skillspector-rs"
path = "src/main.rs"

[build-dependencies]
