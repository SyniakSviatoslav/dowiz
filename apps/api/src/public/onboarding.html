<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeliveryOS — Onboarding</title>
  <link href="/dist/tabler/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/admin/dashboard.js"></script>
  <script src="/admin/push-utils.js"></script>
  <style>
    :root {
      --brand-bg:#0F172A;--brand-surface:#1E293B;--brand-raised:#263548;
      --brand-text:#F1F5F9;--brand-muted:#94A3B8;--brand-border:#334155;
      --brand-primary:#ea4f16;--brand-primary-hover:#ffa12e;
      --color-success:#059669;--color-warning:#D97706;--color-danger:#DC2626;
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--brand-bg); color:var(--brand-text); }
    .card { background:var(--brand-surface); border:1px solid var(--brand-border); border-radius:12px; padding:20px; }
    .btn-primary { background:var(--brand-primary); color:#fff; padding:10px 24px; border-radius:78px; font-weight:600; }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-secondary { background:transparent; border:1px solid var(--brand-border); color:var(--brand-muted); padding:10px 24px; border-radius:78px; }
    .step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
    .step-dot.active { background:var(--brand-primary); color:#fff; }
    .step-dot.done { background:var(--color-success); color:#fff; }
    .step-dot.skipped { background:var(--brand-border); color:var(--brand-muted); }
    .step-dot.pending { background:transparent; border:2px solid var(--brand-border); color:var(--brand-muted); }
    .hide-scrollbar::-webkit-scrollbar { display:none; }
    .import-preview-area pre { white-space:pre-wrap; word-break:break-word; max-height:400px; overflow-y:auto; }
    .file-drop-zone { border:2px dashed var(--brand-border); border-radius:12px; padding:40px 20px; text-align:center; cursor:pointer; transition:border-color 0.2s; }
    .file-drop-zone:hover { border-color:var(--brand-primary); }
    .file-drop-zone.dragover { border-color:var(--brand-primary); background:var(--brand-primary-light, rgba(234,79,22,0.08)); }
    .aha-card { background:linear-gradient(135deg, #7C3AED20 0%, #3B82F620 100%); border:1px solid #7C3AED40; }
  </style>
</head>
<body>
  <div class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-3 border-b" style="border-color:var(--brand-border);background:var(--brand-surface);">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold">DeliveryOS</h1>
        <span class="text-sm px-2 py-0.5 rounded-full" style="background:var(--brand-primary);color:#fff;" id="statusBadge">setup</span>
      </div>
    </header>

    <!-- Progress bar -->
    <div class="px-6 py-4 border-b hide-scrollbar overflow-x-auto" style="border-color:var(--brand-border);background:var(--brand-surface);">
      <div class="flex items-center gap-1 min-w-max" id="progressBar"></div>
    </div>

    <!-- Main content -->
    <div class="flex-1 p-6 max-w-3xl mx-auto w-full" id="mainContent">
      <div class="text-center py-16" style="color:var(--brand-muted);">Loading...</div>
    </div>
  </div>

  <script>
  // ─── Helpers ──────────────────────────────────────────────────────
  const STEPS = [
    { num:1, label:'Location', icon:'ti-building-store' },
    { num:2, label:'Menu Import', icon:'ti-file-import' },
    { num:3, label:'Review', icon:'ti-eye' },
    { num:4, label:'Branding', icon:'ti-palette' },
    { num:5, label:'Delivery', icon:'ti-truck-delivery' },
    { num:6, label:'Publish', icon:'ti-world-share' },
    { num:7, label:'Telegram', icon:'ti-send' },
    { num:8, label:'Go Live', icon:'ti-rocket' },
  ];
  const SKIPPABLE = [4,5,7];
  const SKIP_NOTES = {
    4: 'Branding skipped — default theme applied. You can customize anytime.',
    5: 'Delivery skipped — pickup-only mode with flat 0 fee. Configure later.',
    7: 'Telegram skipped — you\'ll still get alerts on dashboard & push. Add later.',
  };

  const token = getOwnerToken();
  let state = null;
  let locationId = null;
  let slug = null;
  let importSessionId = null;
  let telegramDeepLink = null;

  // ─── Init ─────────────────────────────────────────────────────────
  (async () => {
    if (!token) {
      document.getElementById('mainContent').innerHTML = `<div class="text-center py-16"><p class="text-lg mb-2">Not authenticated</p><p class="text-sm">Please <a href="/29-admin-login.html" class="underline">log in</a> first.</p></div>`;
      return;
    }

    // Resume: check if we have a locationId from a previous session
    locationId = sessionStorage.getItem('onboarding_location_id');
    slug = sessionStorage.getItem('onboarding_slug');
    if (locationId) {
      await loadState();
    }
    if (state) {
      renderProgress();
      renderStep(state.step);
    } else {
      // No session — show start/step 1 (create location)
      renderProgress();
      renderStep(1);
    }
  })();

  async function loadState() {
    try {
      const res = await fetch(`/api/owner/onboarding/${locationId}/state`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) { state = null; return; }
      const data = await res.json();
      state = data.onboardingState;
      slug = data.slug;
      if (data.completed) {
        showCompletionPage();
        return;
      }
    } catch { state = null; }
  }

  function renderProgress() {
    const bar = document.getElementById('progressBar');
    bar.innerHTML = STEPS.map(s => {
      const isComplete = state?.completedSteps?.includes(s.num);
      const isSkipped = state?.skippedSteps?.includes(s.num);
      const isActive = state?.step === s.num || (!state && s.num === 1);
      let cls = 'pending';
      if (isComplete && isSkipped) cls = 'skipped';
      else if (isComplete) cls = 'done';
      else if (isActive) cls = 'active';
      return `<div class="flex items-center gap-1">
        <div class="step-dot ${cls}"><i class="ti ${s.icon} text-[14px] ${isComplete && !isSkipped ? '' : 'hidden'}"></i><span class="${isComplete && !isSkipped ? 'hidden' : ''}">${s.num}</span></div>
        <span class="text-xs ${isActive ? 'font-semibold' : ''}" style="color:${isActive ? 'var(--brand-text)' : 'var(--brand-muted)'}">${s.label}</span>
        ${s.num < STEPS.length ? '<div class="w-6 h-px mx-1" style="background:var(--brand-border)"></div>' : ''}
      </div>`;
    }).join('');
  }

  // ─── Step Renderers ───────────────────────────────────────────────
  function renderStep(step) {
    const container = document.getElementById('mainContent');
    switch(step) {
      case 1: renderStep1(container); break;
      case 2: renderStep2(container); break;
      case 3: renderStep3(container); break;
      case 4: renderStep4(container); break;
      case 5: renderStep5(container); break;
      case 6: renderStep6(container); break;
      case 7: renderStep7(container); break;
      case 8: renderStep8(container); break;
      default: renderCompletionPage(container); break;
    }
  }

  // ─── Step 1: Location Basics ──────────────────────────────────────
  function renderStep1(container) {
    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Welcome to DeliveryOS</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Set up your restaurant in under 15 minutes. Let's start with the basics.</p>
      </div>
      <div class="card">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Restaurant Name *</label>
            <input id="locName" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="e.g. Margherita Pizza" maxlength="200" ${state ? 'readonly' : ''}>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Phone Number *</label>
            <input id="locPhone" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="e.g. +355 69 123 4567" ${state ? 'readonly' : ''}>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">URL Slug *</label>
            <div class="flex items-center gap-2">
              <span class="text-sm" style="color:var(--brand-muted);">dowiz.org/s/</span>
              <input id="locSlug" class="flex-1 h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="margherita-pizza" maxlength="100" ${state ? 'readonly' : ''}>
            </div>
            <p class="text-xs mt-1" style="color:var(--brand-muted);">Lowercase letters, numbers, and hyphens only.</p>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Currency</label>
            <select id="locCurrency" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" ${state ? 'disabled' : ''}>
              <option value="ALL">ALL — Albanian Lek</option>
              <option value="EUR">EUR — Euro</option>
              <option value="USD">USD — US Dollar</option>
            </select>
          </div>
        </div>
        <p id="step1Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
        <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color:var(--brand-border);">
          <p class="text-xs" style="color:var(--brand-muted);">Step 1 of 8</p>
          <button onclick="doStep1()" id="step1Btn" class="btn-primary">${state ? 'Continue' : 'Create Restaurant'}</button>
        </div>
      </div>
    `;
    if (state) {
      document.getElementById('locName').value = slug || '';
      document.getElementById('locPhone').value = '';
      document.getElementById('locSlug').value = slug || '';
    }
  }

  async function doStep1() {
    const btn = document.getElementById('step1Btn');
    const errEl = document.getElementById('step1Error');
    errEl.classList.add('hidden');

    if (locationId && state) {
      // Already have location — just mark complete
      return completeStep(1);
    }

    const name = document.getElementById('locName').value.trim();
    const phone = document.getElementById('locPhone').value.trim();
    const slugVal = document.getElementById('locSlug').value.trim();
    const currency = document.getElementById('locCurrency').value;

    if (!name || !phone || !slugVal) {
      errEl.textContent = 'Please fill in all required fields.';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      const res = await fetch('/api/owner/onboarding/start', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, slug: slugVal, currency_code: currency }),
      });
      if (!res.ok) {
        const data = await res.json();
        if (data.code === 'SLUG_TAKEN') {
          errEl.textContent = 'This URL slug is already taken. Please choose another one.';
        } else {
          errEl.textContent = data.error || `Error ${res.status}`;
        }
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Restaurant';
        return;
      }
      const data = await res.json();
      locationId = data.locationId;
      slug = data.slug;
      state = data.onboardingState;
      sessionStorage.setItem('onboarding_location_id', locationId);
      sessionStorage.setItem('onboarding_slug', slug);
      await completeStep(1);
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Create Restaurant';
    }
  }

  // ─── Step 2: Import Menu ──────────────────────────────────────────
  function renderStep2(container) {
    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Import Your Menu</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Upload a menu photo, PDF, or CSV file. Our AI will extract items automatically.</p>
      </div>
      <div class="card">
        <div class="file-drop-zone" id="dropZone">
          <i class="ti ti-upload text-[32px] mb-2" style="color:var(--brand-primary);"></i>
          <p class="text-sm font-medium">Drop a file here or click to browse</p>
          <p class="text-xs mt-1" style="color:var(--brand-muted);">Supports photos, PDF menus, and CSV files (max 5MB)</p>
          <input type="file" id="fileInput" accept="image/*,application/pdf,.csv" class="hidden">
          <div id="fileInfo" class="hidden mt-3 text-sm" style="color:var(--color-success);"></div>
        </div>
        <div id="importProgress" class="hidden mt-4 text-center py-4">
          <i class="ti ti-loader-2 text-[20px] spinner"></i>
          <p class="text-sm mt-2" style="color:var(--brand-muted);">Processing your menu...</p>
        </div>
        <div id="importResult" class="hidden mt-4"></div>
        <p id="step2Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
        <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color:var(--brand-border);">
          <button onclick="renderStep(1)" class="btn-secondary">Back</button>
          <div class="flex gap-2">
            <button onclick="skipStep(2)" id="skip2Btn" class="btn-secondary">Skip (manual)</button>
            <button onclick="doStep2()" id="step2Btn" class="btn-primary hidden">Continue</button>
          </div>
        </div>
      </div>
    `;
    setupDropZone();
  }

  function setupDropZone() {
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = () => handleFile(fileInput.files[0]);

    function handleFile(file) {
      if (!file) return;
      fileInfo.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      fileInfo.classList.remove('hidden');
      document.getElementById('step2Btn').classList.remove('hidden');
      document.getElementById('skip2Btn').textContent = 'Skip & Manual';
      window._importFile = file;
    }
  }

  async function doStep2() {
    const file = window._importFile;
    if (!file) return;

    const progress = document.getElementById('importProgress');
    const result = document.getElementById('importResult');
    const errEl = document.getElementById('step2Error');
    const btn = document.getElementById('step2Btn');

    progress.classList.remove('hidden');
    result.classList.add('hidden');
    errEl.classList.add('hidden');
    btn.disabled = true;

    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('mode', 'replace');

      const res = await fetch(`/api/owner/locations/${locationId}/menu/import/preview`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData,
      });

      if (!res.ok) {
        const data = await res.json();
        errEl.textContent = data.error || `Import failed (${res.status})`;
        errEl.classList.remove('hidden');
        progress.classList.add('hidden');
        btn.disabled = false;
        return;
      }

      const data = await res.json();
      importSessionId = data.import_session_id;
      progress.classList.add('hidden');

      result.innerHTML = `
        <div class="rounded-lg p-4" style="background:var(--color-success)10;border:1px solid var(--color-success)30;">
          <p class="text-sm font-medium" style="color:var(--color-success);"><i class="ti ti-circle-check mr-1"></i> Preview successful!</p>
          <div class="text-xs mt-2 space-y-1" style="color:var(--brand-muted);">
            <p>Categories: ${data.summary?.valid?.categories || data.draft_preview?.categories_to_create?.length || 0}</p>
            <p>Products: ${data.summary?.valid?.products || data.draft_preview?.products_to_create?.length || 0}</p>
            ${data.summary?.warnings?.length ? `<p style="color:var(--color-warning);">${data.summary.warnings.length} warning(s)</p>` : ''}
            ${data.summary?.low_confidence_count ? `<p style="color:var(--color-warning);">${data.summary.low_confidence_count} item(s) need review</p>` : ''}
          </div>
        </div>
        <div class="mt-3 flex gap-2">
          <button onclick="goToStep(3)" class="btn-primary">Review & Commit</button>
          <button onclick="doStep2Commit()" class="btn-secondary">Commit directly</button>
        </div>
      `;
      result.classList.remove('hidden');
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.remove('hidden');
      progress.classList.add('hidden');
      btn.disabled = false;
    }
  }

  async function doStep2Commit() {
    const errEl = document.getElementById('step2Error');
    const btn = document.querySelector('#importResult button');
    if (btn) btn.disabled = true;

    try {
      const res = await fetch(`/api/owner/locations/${locationId}/menu/import/commit`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ import_session_id: importSessionId, force: true }),
      });
      if (!res.ok) {
        const data = await res.json();
        errEl.textContent = data.error || 'Commit failed';
        errEl.classList.remove('hidden');
        if (btn) btn.disabled = false;
        return;
      }
      await completeStep(2);
    } catch (e) {
      errEl.textContent = 'Network error.';
      errEl.classList.remove('hidden');
      if (btn) btn.disabled = false;
    }
  }

  // ─── Step 3: Review & Fix Menu ────────────────────────────────────
  function renderStep3(container) {
    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Review Your Menu</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Review the imported items. You can edit them later in the dashboard.</p>
      </div>
      <div class="card">
        <div class="text-center py-8">
          <i class="ti ti-eye text-[32px] mb-2" style="color:var(--color-success);"></i>
          <p class="text-sm font-medium">Menu imported successfully</p>
          <p class="text-xs mt-1" style="color:var(--brand-muted);">You can view and edit your full menu from the dashboard after onboarding.</p>
        </div>
        <div class="flex items-center gap-3 p-3 rounded-lg mt-2" style="background:#3B82F610;border:1px solid #3B82F630;">
          <i class="ti ti-link text-[16px]" style="color:#3B82F6;"></i>
          <div>
            <p class="text-sm font-medium">Preview your menu page</p>
            <a href="/s/${slug}" target="_blank" class="text-xs underline" style="color:#3B82F6;">dowiz.org/s/${slug}</a>
          </div>
        </div>
        <p id="step3Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
        <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color:var(--brand-border);">
          <button onclick="renderStep(2)" class="btn-secondary">Back</button>
          <button onclick="completeStep(3)" class="btn-primary">Looks Good!</button>
        </div>
      </div>
    `;
  }

  // ─── Step 4: Branding ─────────────────────────────────────────────
  function renderStep4(container) {
    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Brand Your Restaurant</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Customize colors and upload your logo to match your brand.</p>
      </div>
      <div class="card">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Primary Color</label>
            <div class="flex items-center gap-3">
              <input id="brandPrimary" type="color" value="#e63946" class="w-[44px] h-[44px] rounded-lg cursor-pointer" style="background:var(--brand-raised);border:1px solid var(--brand-border);">
              <input id="brandPrimaryText" class="flex-1 h-[44px] px-4 border rounded-[12px] text-[14px] font-mono outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" value="#e63946" maxlength="7">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Font</label>
            <select id="brandFont" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);">
              <option value="system-ui">System Default</option>
              <option value="Inter">Inter</option>
              <option value="Roboto">Roboto</option>
              <option value="Source Sans 3">Source Sans 3</option>
              <option value="Lato">Lato</option>
              <option value="Open Sans">Open Sans</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Logo</label>
            <input id="brandLogo" type="file" accept="image/*" class="w-full text-sm" style="color:var(--brand-muted);">
            <p class="text-xs mt-1" style="color:var(--brand-muted);">Optional. Will be resized to 512x512 WebP.</p>
          </div>
        </div>
        <p id="step4Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
        <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color:var(--brand-border);">
          <button onclick="renderStep(3)" class="btn-secondary">Back</button>
          <div class="flex gap-2">
            <button onclick="doStep4Skip()" class="btn-secondary">Skip</button>
            <button onclick="doStep4()" class="btn-primary">Save Branding</button>
          </div>
        </div>
      </div>
    `;

    document.getElementById('brandPrimary').addEventListener('input', (e) => {
      document.getElementById('brandPrimaryText').value = e.target.value;
    });
    document.getElementById('brandPrimaryText').addEventListener('input', (e) => {
      const v = e.target.value.trim();
      if (/^#[0-9a-f]{6}$/i.test(v)) document.getElementById('brandPrimary').value = v;
    });
  }

  async function doStep4() {
    const errEl = document.getElementById('step4Error');
    const primary = document.getElementById('brandPrimaryText').value.trim();
    const font = document.getElementById('brandFont').value;
    const logoFile = document.getElementById('brandLogo').files[0];

    errEl.classList.add('hidden');

    try {
      // Save theme
      const themeRes = await fetch(`/api/owner/locations/${locationId}/theme`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          primary_color: /^#[0-9a-f]{6}$/i.test(primary) ? primary : null,
          font_family: font !== 'system-ui' ? font : null,
        }),
      });
      if (!themeRes.ok) throw new Error('Theme save failed');

      // Upload logo if provided
      if (logoFile) {
        const logoForm = new FormData();
        logoForm.append('file', logoFile);
        await fetch(`/api/owner/locations/${locationId}/theme/logo`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: logoForm,
        });
      }

      await completeStep(4);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
    }
  }

  async function doStep4Skip() { await skipStep(4); }

  // ─── Step 5: Delivery ─────────────────────────────────────────────
  function renderStep5(container) {
    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Delivery Settings</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Configure delivery radius, fees, and minimum order. Skip for pickup-only.</p>
      </div>
      <div class="card">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Delivery Radius (km)</label>
            <input id="delRadius" type="number" min="0" step="0.5" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="5">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Flat Delivery Fee (ALL)</label>
            <input id="delFee" type="number" min="0" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="200">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Minimum Order (ALL)</label>
            <input id="delMinOrder" type="number" min="0" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="0">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Free Delivery Above (ALL, optional)</label>
            <input id="delFreeThreshold" type="number" min="0" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Tax Rate (%)</label>
            <input id="delTax" type="number" min="0" max="100" step="0.1" class="w-full h-[44px] px-4 border rounded-[12px] text-[14px] outline-none" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" placeholder="0">
          </div>
        </div>
        <p id="step5Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
        <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color:var(--brand-border);">
          <button onclick="renderStep(4)" class="btn-secondary">Back</button>
          <div class="flex gap-2">
            <button onclick="doStep5Skip()" class="btn-secondary">Skip (pickup only)</button>
            <button onclick="doStep5()" class="btn-primary">Save Delivery</button>
          </div>
        </div>
      </div>
    `;
  }

  async function doStep5() {
    const errEl = document.getElementById('step5Error');
    errEl.classList.add('hidden');

    const body = {
      delivery_radius_km: parseFloat(document.getElementById('delRadius').value) || null,
      delivery_fee_flat: parseInt(document.getElementById('delFee').value) || 0,
      min_order_value: parseInt(document.getElementById('delMinOrder').value) || null,
      free_delivery_threshold: parseInt(document.getElementById('delFreeThreshold').value) || null,
      tax_rate: parseFloat(document.getElementById('delTax').value) || 0,
    };

    try {
      const res = await fetch(`/api/owner/locations/${locationId}`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`Save failed: ${res.status}`);
      await completeStep(5);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
    }
  }
  async function doStep5Skip() { await skipStep(5); }

  // ─── Step 6: Publish & Share ──────────────────────────────────────
  function renderStep6(container) {
    const baseUrl = location.origin;
    const menuUrl = `${baseUrl}/s/${slug}`;
    const iframeSnippet = `<iframe src="${menuUrl}?embed=true" width="100%" height="600" frameborder="0"></iframe>`;
    const widgetSnippet = `<script src="${baseUrl}/widget.js?slug=${slug}"><\/script>`;

    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Your Menu is Live! 🎉</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Your restaurant menu is now public. Share it with your customers.</p>
      </div>
      <div class="aha-card card mb-4">
        <div class="flex items-start gap-3">
          <i class="ti ti-sparkles text-[24px]" style="color:#7C3AED;"></i>
          <div>
            <p class="text-sm font-bold">Your menu is already live at:</p>
            <a href="${menuUrl}" target="_blank" class="text-sm underline font-mono" style="color:#A78BFA;">${menuUrl}</a>
            <p class="text-xs mt-1" style="color:var(--brand-muted);">No extra steps — your menu was published automatically!</p>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <p class="text-sm font-medium mb-2"><i class="ti ti-code mr-1" style="color:var(--brand-primary);"></i> Embed in Your Website</p>
        <div class="flex gap-2">
          <input id="iframeSnippet" class="flex-1 h-[36px] px-3 text-xs font-mono border rounded-lg" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-muted);" value='${iframeSnippet}' readonly>
          <button onclick="copySnippet('iframeSnippet')" class="px-3 py-1.5 text-xs rounded-lg font-medium" style="background:var(--brand-primary);color:#fff;">Copy</button>
        </div>
      </div>

      <div class="card mb-3">
        <p class="text-sm font-medium mb-2"><i class="ti ti-script mr-1" style="color:var(--brand-primary);"></i> Widget Script</p>
        <div class="flex gap-2">
          <input id="widgetSnippet" class="flex-1 h-[36px] px-3 text-xs font-mono border rounded-lg" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-muted);" value='${widgetSnippet}' readonly>
          <button onclick="copySnippet('widgetSnippet')" class="px-3 py-1.5 text-xs rounded-lg font-medium" style="background:var(--brand-primary);color:#fff;">Copy</button>
        </div>
      </div>

      <p id="step6Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
      <div class="flex items-center justify-between mt-4">
        <button onclick="renderStep(5)" class="btn-secondary">Back</button>
        <button onclick="completeStep(6)" class="btn-primary">Continue</button>
      </div>
    `;
  }

  function copySnippet(id) {
    const el = document.getElementById(id);
    el.select();
    navigator.clipboard.writeText(el.value).catch(() => {});
    const orig = el.style.color;
    el.style.color = 'var(--color-success)';
    setTimeout(() => el.style.color = orig, 1500);
  }

  // ─── Step 7: Telegram ─────────────────────────────────────────────
  function renderStep7(container) {
    container.innerHTML = `
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2">Connect Telegram Alerts</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Get instant notifications for new orders and dwell alerts on Telegram.</p>
      </div>
      <div class="card">
        <div id="telegramConnectPane">
          <div class="text-center py-6">
            <i class="ti ti-send text-[40px] mb-3" style="color:#2AABEE;"></i>
            <p class="text-sm mb-2">Recommended: Connect Telegram for reliable alerts</p>
            <p class="text-xs mb-4" style="color:var(--brand-muted);">Browser push may not work on all devices. Telegram ensures you never miss an order.</p>
            <button onclick="doStep7Connect()" id="telegramBtn" class="btn-primary"><i class="ti ti-brand-telegram mr-1"></i> Connect Telegram</button>
            <div id="telegramLinkArea" class="hidden mt-4"></div>
          </div>
        </div>
        <div id="telegramConnected" class="hidden text-center py-4">
          <i class="ti ti-circle-check text-[32px]" style="color:var(--color-success);"></i>
          <p class="text-sm font-medium mt-2" style="color:var(--color-success);">Telegram connected!</p>
          <p class="text-xs mt-1" style="color:var(--brand-muted);">You'll receive order alerts via Telegram.</p>
        </div>
        <p id="step7Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
        <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color:var(--brand-border);">
          <button onclick="renderStep(6)" class="btn-secondary">Back</button>
          <div class="flex gap-2">
            <button onclick="doStep7Skip()" class="btn-secondary">Skip</button>
            <button onclick="doStep7Complete()" class="btn-primary">Continue</button>
          </div>
        </div>
      </div>
    `;
    // Check if already connected
    checkTelegramState();
  }

  async function checkTelegramState() {
    try {
      const res = await fetch(`/api/owner/locations/${locationId}/notifications/targets`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        const data = await res.json();
        const hasTelegram = data.targets?.some(t => t.channel === 'telegram' && t.status === 'active');
        if (hasTelegram) {
          document.getElementById('telegramConnectPane').classList.add('hidden');
          document.getElementById('telegramConnected').classList.remove('hidden');
        }
      }
    } catch {}
  }

  async function doStep7Connect() {
    const btn = document.getElementById('telegramBtn');
    btn.disabled = true;
    btn.textContent = 'Generating link...';
    const errEl = document.getElementById('step7Error');
    errEl.classList.add('hidden');

    try {
      const res = await fetch(`/api/owner/locations/${locationId}/notifications/telegram/connect-init`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) throw new Error('Failed to generate link');

      const data = await res.json();
      document.getElementById('telegramLinkArea').innerHTML = `
        <p class="text-sm font-medium mb-2">Send this command to <strong>@dowiz_bot</strong> on Telegram:</p>
        <div class="flex gap-2 items-center">
          <input class="flex-1 h-[36px] px-3 text-xs font-mono border rounded-lg" style="background:var(--brand-raised);border-color:var(--brand-border);color:var(--brand-text);" value="/start ${data.token}" readonly>
          <button onclick="copySnippetDynamic('/start ${data.token}')" class="px-3 py-1.5 text-xs rounded-lg font-medium" style="background:var(--brand-primary);color:#fff;">Copy</button>
        </div>
        <a href="${data.deepLink}" target="_blank" class="inline-block mt-2 text-xs underline" style="color:#2AABEE;">Open in Telegram</a>
      `;
      document.getElementById('telegramLinkArea').classList.remove('hidden');
      btn.textContent = 'Connected! Check Telegram';
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = '<i class="ti ti-brand-telegram mr-1"></i> Connect Telegram';
    }
  }

  function copySnippetDynamic(text) {
    navigator.clipboard.writeText(text).catch(() => {});
  }

  async function doStep7Skip() { await skipStep(7); }

  async function doStep7Complete() {
    // Mark step done regardless of connection status
    await completeStep(7);
  }

  // ─── Step 8: Test Order & Go Live ─────────────────────────────────
  function renderStep8(container) {
    container.innerHTML = `
      <div class="mb-8 text-center">
        <i class="ti ti-rocket text-[40px] mb-2" style="color:var(--brand-primary);"></i>
        <h2 class="text-2xl font-bold mb-2">Almost There!</h2>
        <p class="text-sm" style="color:var(--brand-muted);">Place a test order to verify everything works, then go live!</p>
      </div>

      <div class="card mb-3">
        <p class="text-sm font-medium mb-2"><i class="ti ti-shopping-cart mr-1" style="color:var(--brand-primary);"></i> Test order</p>
        <p class="text-xs mb-3" style="color:var(--brand-muted);">This will place a real order marked as "test" — no cash collected, no metrics affected.</p>
        <div class="space-y-2 text-sm">
          <div class="flex items-center justify-between p-2 rounded-lg" style="background:var(--brand-raised);">
            <span>Items:</span>
            <span class="text-xs" style="color:var(--brand-muted);">1x Margherita Pizza (auto-selected)</span>
          </div>
          <div class="flex items-center justify-between p-2 rounded-lg" style="background:var(--brand-raised);">
            <span>Total:</span>
            <span id="testOrderTotal" style="color:var(--brand-primary);font-weight:600;">—</span>
          </div>
          <div class="flex items-center gap-2 p-2 rounded-lg" style="background:var(--brand-raised);">
            <label class="text-xs">Delivery address:</label>
            <input id="testAddress" class="flex-1 h-[32px] px-3 text-xs border rounded-lg" style="background:var(--brand-surface);border-color:var(--brand-border);color:var(--brand-text);" placeholder="Rruga e Durrësit, Tirana" value="Test Address">
          </div>
          <div class="flex items-center gap-2 p-2 rounded-lg" style="background:var(--brand-raised);">
            <label class="text-xs">Phone:</label>
            <input id="testPhone" class="flex-1 h-[32px] px-3 text-xs border rounded-lg" style="background:var(--brand-surface);border-color:var(--brand-border);color:var(--brand-text);" placeholder="+355 69 000 0000" value="+355690000000">
          </div>
        </div>
        <button onclick="doStep8TestOrder()" id="testOrderBtn" class="mt-4 w-full btn-primary flex items-center justify-center gap-2">
          <i class="ti ti-shopping-cart"></i> Place Test Order
        </button>
        <div id="testOrderResult" class="hidden mt-3 text-center py-4">
          <i class="ti ti-circle-check text-[32px]" style="color:var(--color-success);"></i>
          <p class="text-sm font-medium mt-2" style="color:var(--color-success);">Test order placed!</p>
          <p class="text-xs mt-1" style="color:var(--brand-muted);">Check your dashboard to see it arrive. Alert should fire within 60s.</p>
        </div>
        <p id="step8Error" class="text-sm mt-3 hidden" style="color:var(--color-danger);"></p>
      </div>

      <div class="flex items-center justify-between">
        <button onclick="renderStep(7)" class="btn-secondary">Back</button>
        <button onclick="doStep8Complete()" class="btn-primary" id="goLiveBtn">Go Live → Dashboard</button>
      </div>
    `;
    loadFirstProduct();
  }

  async function loadFirstProduct() {
    try {
      const res = await fetch(`/public/locations/${slug}/menu`);
      if (!res.ok) return;
      const data = await res.json();
      const firstProd = data.categories?.[0]?.products?.[0];
      if (firstProd) {
        document.getElementById('testOrderTotal').textContent = `${(firstProd.price / 100).toFixed(2)} ALL`;
        window._testProduct = firstProd;
        window._testCategory = data.categories[0];
      }
    } catch {}
  }

  async function doStep8TestOrder() {
    const btn = document.getElementById('testOrderBtn');
    const errEl = document.getElementById('step8Error');
    const resultEl = document.getElementById('testOrderResult');
    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2 spinner"></i> Placing...';

    try {
      const product = window._testProduct;
      if (!product) throw new Error('No menu items found. Import a menu first.');

      const address = document.getElementById('testAddress').value.trim() || 'Test Address, Tirana';
      const phone = document.getElementById('testPhone').value.trim() || '+355690000000';

      const orderPayload = {
        location_id: locationId,
        items: [{ product_id: product.id, quantity: 1, modifier_ids: [] }],
        customer: { name: 'Test Customer', phone },
        delivery: {
          address_text: address,
          pin: { lat: 41.3275, lng: 19.8187 },
        },
        idempotency_key: crypto.randomUUID ? crypto.randomUUID() : 'test-' + Date.now(),
        acknowledged_codes: [],
      };

      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderPayload),
      });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || data.reasons?.[0]?.message || `Order failed (${res.status})`);
      }

      // Mark as test in metadata
      const orderData = await res.json();
      if (orderData.id) {
        await fetch(`/api/owner/locations/${locationId}/orders/${orderData.id}/metadata`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ test_order: true }),
        }).catch(() => {});
      }

      resultEl.classList.remove('hidden');
      btn.classList.add('hidden');
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-shopping-cart"></i> Place Test Order';
    }
  }

  async function doStep8Complete() { await completeStep(8); }

  function showCompletionPage() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `
      <div class="text-center py-12">
        <i class="ti ti-circle-check text-[48px] mb-3" style="color:var(--color-success);"></i>
        <h2 class="text-2xl font-bold mb-2">Onboarding Complete! 🎉</h2>
        <p class="text-sm mb-6" style="color:var(--brand-muted);">Your restaurant is live. Head to the dashboard to manage orders and settings.</p>
        <a href="/admin/dashboard.html" class="btn-primary inline-block">Go to Dashboard</a>
      </div>
    `;
    sessionStorage.removeItem('onboarding_location_id');
    sessionStorage.removeItem('onboarding_slug');
  }

  // ─── Skip & Complete helpers ──────────────────────────────────────
  function goToStep(n) {
    state.step = n;
    renderProgress();
    renderStep(n);
  }

  async function completeStep(step) {
    if (!state) return;
    try {
      const res = await fetch(`/api/owner/onboarding/${locationId}/step/complete`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ step }),
      });
      if (!res.ok) throw new Error('Failed to save progress');
      const data = await res.json();
      state = data.onboardingState;
      renderProgress();
      if (data.completed) {
        showCompletionPage();
      } else {
        renderStep(data.currentStep);
      }
    } catch (e) {
      showInlineError(e.message);
    }
  }

  async function skipStep(step) {
    try {
      const res = await fetch(`/api/owner/onboarding/${locationId}/step/${step}/skip`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) throw new Error('Failed to skip');
      const data = await res.json();
      state = data.onboardingState;
      renderProgress();
      if (data.completed) {
        showCompletionPage();
      } else {
        // Show toast with skip note
        if (data.skipNote) showToast(data.skipNote);
        renderStep(data.currentStep);
      }
    } catch (e) {
      showInlineError(e.message);
    }
  }

  function showInlineError(msg) {
    const err = document.createElement('div');
    err.className = 'fixed bottom-4 right-4 px-4 py-2 rounded-lg text-sm shadow-lg z-50';
    err.style.cssText = 'background:var(--color-danger);color:#fff;';
    err.textContent = msg;
    document.body.appendChild(err);
    setTimeout(() => err.remove(), 4000);
  }

  function showToast(text) {
    let t = document.getElementById('toastNote');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toastNote';
      t.className = 'fixed bottom-4 right-4 px-4 py-2 rounded-lg text-sm shadow-lg z-50';
      document.body.appendChild(t);
    }
    t.style.cssText = 'background:#7C3AED;color:#fff;';
    t.textContent = text;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 5000);
  }
  </script>
</body>
</html>
