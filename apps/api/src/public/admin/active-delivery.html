<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeliveryOS — Active Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/admin/dashboard.js"></script>
  <style>
    :root {
      --brand-bg:#0F172A;--brand-surface:#1E293B;--brand-raised:#263548;
      --brand-text:#F1F5F9;--brand-muted:#94A3B8;--brand-border:#334155;
      --brand-primary:#ea4f16;
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--brand-bg); color:var(--brand-text); }
    .delivery-card { background:var(--brand-surface); border:1px solid var(--brand-border); border-radius:12px; padding:16px; }
    .delivery-card:hover { border-color:var(--brand-primary); }
  </style>
</head>
<body>
  <div class="flex flex-col h-screen">
    <header class="flex items-center justify-between px-6 py-3 border-b" style="border-color:var(--brand-border);background:var(--brand-surface);">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold">DeliveryOS</h1>
        <span class="text-sm" style="color:var(--brand-muted);">Active Delivery</span>
      </div>
      <div class="flex items-center gap-4 text-sm" style="color:var(--brand-muted);">
        <a href="/admin/dashboard.html" class="hover:text-white">Dashboard</a>
        <a href="/admin/orders.html" class="hover:text-white">Orders</a>
        <a href="/admin/active-delivery.html" class="text-white">Active Delivery</a>
      </div>
    </header>

    <div class="flex-1 overflow-auto p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Active Deliveries</h2>
        <span class="text-sm px-3 py-1 rounded-full" id="deliveryCount" style="background:var(--brand-primary);color:#fff;">0</span>
      </div>
      <div id="deliveryList" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>
  </div>

  <script>
  (async () => {
    const token = getOwnerToken();
    const locationId = getLocationId();
    if (!token || !locationId) { document.body.innerHTML = '<div class="flex items-center justify-center h-screen"><p>Not authenticated. <a href="/29-admin-login.html">Log in</a>.</p></div>'; return; }

    const list = document.getElementById('deliveryList');
    const count = document.getElementById('deliveryCount');

    async function loadDeliveries() {
      try {
        const data = await fetchSnapshot(locationId, token, { status: 'IN_DELIVERY,READY' });
        const deliveries = data.activeDeliveries || [];
        const wsOrders = data.orders?.filter(o => o.status === 'IN_DELIVERY') || [];
        count.textContent = deliveries.length;

        if (deliveries.length === 0 && wsOrders.length === 0) {
          list.innerHTML = '<div class="col-span-full text-center py-16" style="color:var(--brand-muted);"><p class="text-lg mb-2">No active deliveries</p><p class="text-sm">Orders with couriers assigned will appear here</p></div>';
          return;
        }

        list.innerHTML = deliveries.map(d => {
          const statusLabel = d.status === 'IN_DELIVERY' ? 'En Route' : 'Ready';
          const distanceText = d.distanceToDestinationKm != null ? `${d.distanceToDestinationKm.toFixed(1)} km` : '--';
          const etaText = d.etaSeconds != null ? `${Math.round(d.etaSeconds / 60)} min` : '--';
          return `<div class="delivery-card">
            <div class="flex items-center justify-between mb-3">
              <span class="font-mono text-xs" style="color:var(--brand-muted);">#${d.orderId.slice(0,8)}</span>
              <span class="text-xs px-2 py-0.5 rounded-full" style="background:#3B82F620;color:#3B82F6;border:1px solid #3B82F640;">${statusLabel}</span>
            </div>
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold" style="background:var(--brand-primary);color:#fff;">${(d.courierName || '?').charAt(0)}</div>
              <div>
                <div class="font-medium">${d.courierName || 'Courier'}</div>
                <div class="text-xs" style="color:var(--brand-muted);">${d.courierPhone}</div>
              </div>
            </div>
            <div class="flex items-center justify-between text-sm">
              <div><span class="text-xs" style="color:var(--brand-muted);">Distance</span><br>${distanceText}</div>
              <div><span class="text-xs" style="color:var(--brand-muted);">ETA</span><br>${etaText}</div>
            </div>
          </div>`;
        }).join('');
      } catch (e) {
        list.innerHTML = `<div class="col-span-full text-center py-16" style="color:var(--brand-muted);"><p>Failed to load: ${e.message}</p></div>`;
      }
    }

    await loadDeliveries();

    // Live updates via WS
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${location.host}`;
    new DashboardWSClient({
      url: wsUrl, token, locationId,
      onStatusChange: () => {},
      onEvent: (msg) => {
        const d = msg.data || msg.payload || msg;
        if (msg.type === 'courier.assignment_created' || msg.type === 'order.in_delivery' || msg.type === 'courier.position_updated') {
          loadDeliveries();
        }
      },
    });

    // Auto-refresh every 15s as fallback for position updates
    setInterval(loadDeliveries, 15000);
  })();
  </script>
</body>
</html>
