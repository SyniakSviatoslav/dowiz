<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeliveryOS — Alerts</title>
  <link href="/dist/tabler/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/admin/dashboard.js"></script>
  <style>
    :root {
      --brand-bg:#0F172A;--brand-surface:#1E293B;--brand-raised:#263548;
      --brand-text:#F1F5F9;--brand-muted:#94A3B8;--brand-border:#334155;
      --brand-primary:#ea4f16;--brand-primary-hover:#ffa12e;
      --status-active:#DC2626;--status-resolved:#059669;--status-pending:#D97706;
      --escalation-0:#94A3B8;--escalation-1:#F59E0B;--escalation-2:#DC2626;--escalation-3:#7C3AED;
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--brand-bg); color:var(--brand-text); }
    .alert-row { background:var(--brand-surface); border:1px solid var(--brand-border); border-radius:10px; padding:14px 16px; }
    .alert-row:hover { border-color:var(--brand-primary); }
    .reconnect-banner { position:fixed; top:0; left:0; right:0; z-index:100; text-align:center; padding:8px; font-size:14px; }
  </style>
</head>
<body>
  <div id="reconnectBanner" class="reconnect-banner hidden"></div>
  <div class="flex flex-col min-h-screen">
    <header class="flex items-center justify-between px-6 py-3 border-b" style="border-color:var(--brand-border);background:var(--brand-surface);">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold">DeliveryOS</h1>
        <span class="text-sm px-2 py-0.5 rounded-full" style="background:var(--status-active);color:#fff;" id="statusBadge">connecting</span>
      </div>
      <div class="flex items-center gap-4 text-sm" style="color:var(--brand-muted);">
        <a href="/admin/dashboard.html" class="hover:text-white">Dashboard</a>
        <a href="/admin/orders.html" class="hover:text-white">Orders</a>
        <a href="/admin/active-delivery.html" class="hover:text-white">Active Delivery</a>
        <a href="/admin/alerts.html" class="hover:text-white font-semibold" style="color:var(--brand-text);">Alerts</a>
        <a href="/admin/settings-dwell.html" class="hover:text-white">Dwell</a>
      </div>
    </header>

    <!-- Filters -->
    <div class="flex items-center gap-3 px-6 py-3 border-b flex-wrap" style="border-color:var(--brand-border);background:var(--brand-surface);">
      <select id="statusFilter" class="text-sm px-3 py-1.5 rounded-lg" style="background:var(--brand-bg);border:1px solid var(--brand-border);color:var(--brand-text);">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="resolved">Resolved (24h)</option>
      </select>
      <select id="kindFilter" class="text-sm px-3 py-1.5 rounded-lg" style="background:var(--brand-bg);border:1px solid var(--brand-border);color:var(--brand-text);">
        <option value="">All kinds</option>
        <option value="dwell_pending">Dwell Pending</option>
        <option value="dwell_confirmed">Dwell Confirmed</option>
        <option value="dwell_preparing">Dwell Preparing</option>
        <option value="dwell_en_route">Dwell En Route</option>
      </select>
      <button onclick="acknowledgeAll()" class="ml-auto text-sm px-4 py-1.5 rounded-lg font-medium" style="background:var(--brand-primary);color:#fff;">Acknowledge All</button>
      <button onclick="refresh()" class="text-sm px-3 py-1.5 rounded-lg" style="background:var(--brand-bg);border:1px solid var(--brand-border);color:var(--brand-text);">
        <i class="ti ti-refresh"></i>
      </button>
    </div>

    <!-- Alert list -->
    <div class="flex-1 p-6" id="alertContainer">
      <div class="text-center py-16" style="color:var(--brand-muted);" id="loadingState">Loading alerts...</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="hidden px-6 pb-4 flex items-center justify-between text-sm" style="color:var(--brand-muted);">
      <span id="alertCount">0 alerts</span>
      <button id="loadMore" class="hidden px-4 py-1.5 rounded-lg" style="background:var(--brand-bg);border:1px solid var(--brand-border);color:var(--brand-text);" onclick="loadMore()">Load more</button>
    </div>
  </div>

  <script>
  (async () => {
    const token = getOwnerToken();
    const locationId = getLocationId();
    if (!token || !locationId) {
      document.body.innerHTML = `<div class="flex items-center justify-center h-screen" style="color:var(--brand-muted);"><div class="text-center"><p class="text-lg mb-2">Not authenticated</p><p class="text-sm">Please <a href="/29-admin-login.html" class="underline">log in</a> first.</p></div></div>`;
      return;
    }

    const ESCALATION_LABELS = {0:'None',1:'Push',2:'Telegram',3:'SMS'};
    const ESCALATION_COLORS = {0:'var(--escalation-0)',1:'var(--escalation-1)',2:'var(--escalation-2)',3:'var(--escalation-3)'};
    const KIND_LABELS = {dwell_pending:'Dwell (Pending)',dwell_confirmed:'Dwell (Confirmed)',dwell_preparing:'Dwell (Preparing)',dwell_en_route:'Dwell (En Route)'};

    let cursor = null;
    let hasMore = false;

    const statusFilter = document.getElementById('statusFilter');
    const kindFilter = document.getElementById('kindFilter');
    const alertContainer = document.getElementById('alertContainer');
    const pagination = document.getElementById('pagination');
    const alertCount = document.getElementById('alertCount');
    const loadMoreBtn = document.getElementById('loadMore');
    const loadingState = document.getElementById('loadingState');

    async function fetchAlerts(reset = true) {
      if (reset) { cursor = null; alertContainer.innerHTML = '<div class="text-center py-16" style="color:var(--brand-muted);">Loading...</div>'; }
      const params = new URLSearchParams();
      const status = statusFilter.value;
      const kind = kindFilter.value;
      if (status) params.set('status', status);
      if (kind) params.set('kind', kind);
      if (!reset && cursor) params.set('cursor', cursor);
      params.set('limit', '50');

      const url = `/api/owner/locations/${locationId}/alerts?${params}`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error(`Failed: ${res.status}`);
      const data = await res.json();
      return data;
    }

    function renderAlerts(data, append = false) {
      const { alerts, nextCursor } = data;
      hideLoadingState();

      if (!append) alertContainer.innerHTML = '';
      pagination.classList.remove('hidden');

      if (alerts.length === 0 && !append) {
        alertContainer.innerHTML = '<div class="text-center py-16" style="color:var(--brand-muted);"><i class="ti ti-bell-off text-3xl"></i><p class="mt-2">No alerts</p></div>';
        pagination.classList.add('hidden');
        return;
      }

      for (const a of alerts) {
        const el = document.createElement('div');
        el.className = 'alert-row flex items-start justify-between gap-4 mb-2';
        const kindLabel = KIND_LABELS[a.kind] || a.kind;
        const escalationLabel = ESCALATION_LABELS[a.escalationLevel] || 'Unknown';
        const escalationColor = ESCALATION_COLORS[a.escalationLevel] || 'var(--escalation-0)';
        const isActive = a.status === 'active';
        const dwellStr = a.dwellSeconds != null ? formatDwell(a.dwellSeconds) : '--:--';

        el.innerHTML = `<div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="w-2 h-2 rounded-full" style="background:${isActive ? 'var(--status-active)' : 'var(--status-resolved)'}"></span>
            <span class="font-medium text-sm">${kindLabel}</span>
            <span class="text-xs px-1.5 py-0.5 rounded" style="background:${escalationColor}20;color:${escalationColor};">T${a.escalationLevel + 1} ${escalationLabel}</span>
          </div>
          <div class="text-xs" style="color:var(--brand-muted);">
            Order <span class="font-mono">#${(a.orderId || '').substring(0, 8)}</span>
            · ${a.customerNameMasked}
            · ${dwellStr}
          </div>
          <div class="text-xs mt-1" style="color:var(--brand-muted);">
            ${a.total ? (a.total / 100).toFixed(2) + ' ' + (a.currency || 'ALL') : ''}
            ${a.lastError ? '· Error: ' + a.lastError.substring(0, 80) : ''}
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          ${isActive ? `<button onclick="acknowledge('${a.id}')" class="text-xs px-3 py-1.5 rounded-lg font-medium" style="background:var(--brand-primary);color:#fff;">Ack</button>` : `<span class="text-xs" style="color:var(--brand-muted);">${new Date(a.resolvedAt).toLocaleTimeString()}</span>`}
        </div>`;

        if (append) {
          alertContainer.appendChild(el);
        } else {
          alertContainer.appendChild(el);
        }
      }

      alertCount.textContent = `${append ? 'Showing ' + (alertContainer.children.length) + ' ' : ''}alerts`;
      hasMore = !!nextCursor;
      cursor = nextCursor || null;
      loadMoreBtn.classList.toggle('hidden', !hasMore || alerts.length < 50);
    }

    window.refresh = async () => {
      try {
        const data = await fetchAlerts(true);
        renderAlerts(data);
      } catch (e) {
        alertContainer.innerHTML = `<div class="text-center py-16" style="color:var(--status-active);">Error: ${e.message}</div>`;
      }
    };

    window.loadMore = async () => {
      try {
        const data = await fetchAlerts(false);
        renderAlerts(data, true);
      } catch (e) {
        alert(`Load more failed: ${e.message}`);
      }
    };

    window.acknowledge = async (alertId) => {
      try {
        const res = await fetch(`/api/owner/locations/${locationId}/alerts/${alertId}/acknowledge`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        });
        if (!res.ok) throw new Error(`Failed: ${res.status}`);
        refresh();
      } catch (e) {
        alert(`Acknowledge failed: ${e.message}`);
      }
    };

    window.acknowledgeAll = async () => {
      const kind = kindFilter.value || undefined;
      try {
        const res = await fetch(`/api/owner/locations/${locationId}/alerts/acknowledge-all`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(kind ? { kind } : {}),
        });
        if (!res.ok) throw new Error(`Failed: ${res.status}`);
        refresh();
      } catch (e) {
        alert(`Acknowledge all failed: ${e.message}`);
      }
    };

    function hideLoadingState() {
      const ls = document.getElementById('loadingState');
      if (ls) ls.remove();
    }

    statusFilter.addEventListener('change', () => refresh());
    kindFilter.addEventListener('change', () => refresh());

    // WS live updates
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${location.host}`;
    new DashboardWSClient({
      url: wsUrl,
      token,
      locationId,
      onStatusChange: (status) => {
        const badge = document.getElementById('statusBadge');
        if (badge) {
          badge.textContent = status;
          if (status === 'subscribed') badge.style.background = 'var(--status-resolved)';
          else if (status === 'reconnecting') badge.style.background = 'var(--status-pending)';
        }
      },
      onEvent: (msg) => {
        const type = msg.type || (msg.data && msg.data.type);
        if (type === 'dwell.alert_created' || type === 'dwell.alert_acknowledged' || type === 'dwell.escalation_tier_changed') {
          refresh();
        }
      },
    });

    refresh();
  })();
  </script>
</body>
</html>
