\* TLC model config — BROKEN (drift detector, falsifiability proof).
\* Run:  java -jar tla2tools.jar -config PartitionSchedule-BROKEN.cfg PartitionSchedule.tla
\*
\* Expectation: TLC reports a VIOLATION of SliceSumFitsFrame, because with
\* BROKEN = TRUE the admission gate bypasses the SliceSumFitsFrame check and a
\* partition whose slice pushes AdmittedSliceSum > T can be admitted.
\*
\* That reachable violation IS the falsifiable slice-guarantee statement:
\* a concrete bad state (Sum_{admitted} si > T) is reachable ONLY when the
\* admission policy is wrong. Correct model (BROKEN = FALSE) keeps it GREEN.

SPECIFICATION  Spec

CONSTANTS
    T              <- 6
    MaxPartitions  <- 3
    BROKEN         <- TRUE

INVARIANT
    SliceSumFitsFrame
    SliceGuarantee
    NoOverrun

PROPERTY
    NoStarvation
