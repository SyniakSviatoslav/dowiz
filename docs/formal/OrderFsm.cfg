\* TLC config for OrderFsm.tla. Pins the exact 12-state set (as distinct
\* naturals) so the model stays in lockstep with `LIFECYCLE_STATES`
\* (order_machine.rs:245). A divergence between these values / `IsLegal` and
\* Rust's `allowed_next`/`FSM_ADJ` is caught by the `tlc-gate` CI job (or by
\* `NoIllegalTransition` going RED in a hand-edited variant).

CONSTANTS
  Pending = 0
  Confirmed = 1
  Preparing = 2
  Ready = 3
  InDelivery = 4
  Delivered = 5
  Rejected = 6
  Cancelled = 7
  Scheduled = 8
  PickedUp = 9
  Refunding = 10
  CompensatedRefund = 11

SPECIFICATION Spec

INVARIANTS
  TypeOK
  NoDeadlock

PROPERTIES
  NoIllegalTransition
  TerminatesOrCycles
