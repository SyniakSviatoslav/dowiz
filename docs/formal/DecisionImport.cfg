\* TLC config for DecisionImport.tla. Pinned constants keep the abstract model
\* small and finite (so TLC exhausts). `TagOf` is a 2-element set (two domains
\* exercised); `MaxEpoch` bounds the epoch sweep.

CONSTANTS
  TagOf = {d1, d2}
  MaxEpoch = 3

SPECIFICATION Spec

INVARIANTS
  TypeOK
  NoDeadlock
  LineageClosed

PROPERTIES
  EpochNoDowngrade
  ReplayBeforePersist
