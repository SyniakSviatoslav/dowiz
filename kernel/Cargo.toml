[package]
name = "dowiz-kernel"
version = "0.1.0"
edition = "2021"
description = "dowiz deterministic core: order-state machine (decide/fold Law) + integer money. Rust→WASM. The TS app is the legacy oracle; this is the canonical kernel."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# WASM bindings (optional — kernel is pure Rust, usable headless + from wasm).
wasm-bindgen = "0.2"
# JSON (de)serialization for the wasm-bindgen JS glue. std-only, no native deps.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
curve25519-dalek = "4"
aes-gcm = { version = "0.10.3", features = ["std"] }
# Structured telemetry over the hot paths (order fold, place_order).
tracing = "0.1"
# Pretty env-filter subscriber for `init_tracing()` (shipped; dev/CLI only).
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
# Optional quantum-entropy provider (ANU QRNG over HTTPS). Off by default so the
# crypto crate stays dependency-free and RNG-free; the runtime wires in real entropy.
qrng = []

[dev-dependencies]
paste = "1.0"
# Benchmarking harness for real latency/throughput telemetry.
criterion = "0.5"

[[bench]]
name = "criterion"
harness = false

[profile.release]
opt-level = 3
lto = true
