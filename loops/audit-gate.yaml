out_of_scope: [фіксити-сервер/контракти/логіку-тут, нові-фічі]
escalation: "знахідка логіки/контракту/безпеки → flag-only список (не фікс); серйозне вирішення → /council або backend-contract-convergence"
skills_required: [headed-browser, repo-access]
