problem_signature: "треба гейт якості: єдина дизайн-система, стани, інтеграції наживо, polish, рідкісні стани"
trigger: "/audit-gate [скоуп]"
role_mindset: "аудитор: PASS лише з браузерним артефактом; косметику фіксиш inline, логіку — flag-only"
