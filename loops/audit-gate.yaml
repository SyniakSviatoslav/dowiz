certification:
  fields:
    - name: admit_epoch
      pinned: 1
execution_skills: [live-browser-audit, visual-regression, inline-fix-cosmetic, flag-only-logic, contract-parity-check, engineer-review]
goal: "секції A–F PASS з доказом; випадковий екран не вгадується 'з іншої команди'"
verification: "A єдині токени (grep 0 hex) · B уніфікація станів/кнопок/форм · C інтеграції наживо (Zod-парс, WS, idempotency, помилкові коди) · D polish/анімації/адаптив 390/768/1280 · F рідкісні стани відтворені — кожна PASS зі скріншотом/записом; flag-only винесено окремо"
iron_principles: [proof-by-artifact-not-words, inline-fix-cosmetic-only, flag-only-for-logic-contract-security, single-design-system, live-browser-not-code-reading, no-cookies, no-fake-green]
loop_body: [SENSE, DIAGNOSE, ACT, VERIFY, REPEAT]
exit_conditions: "ВСІ: секції A–F PASS з артефактами; visual-regression baseline 390/768/1280; flag-only винесено окремо; 0 hex у packages/ui; 0 cookie"
gates: [STOP-AUDIT-A, STOP-VERDICT]
