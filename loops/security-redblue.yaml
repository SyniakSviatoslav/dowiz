#     has a terminal disposition (guardrail+ledger | council | carried) with EVIDENCE — advisory.
#   METHOD (primary, disposable): blue scouts + verify:* + E2E replay in-harness; red via Kali+Burp/Autorize/
#     JWT-Editor/SQLmap/JtR on a disposable workstation, ingested through the finding gate.
#   FALLBACK (named): if a blue script is unavailable → its manual runbook §3 step + honest skipped-no-env;
#     if the Kali/Burp path is unavailable → scripted E2E rate-limit/authz assertions in-harness (stays
#     safe, no offensive traffic) + crt.sh via the one-liner; the DoD (evidenced posture + disposed
#     findings) is unchanged, only the method swaps.

test_seam: >
  Full LIVE certification needs a human + a disposable Kali VM (the RED arm) + a reachable staging DB
  (verify:rls/privacy) — environment-blocked for an autonomous cert. The loop's CERTIFIABLE core — the
  finding-gate verdict logic (evidence-not-assumed · no-close-without-guardrail · council-before-redline ·
  advisory-forever) + the blue-arm scout smoke — is certified hermetically by tools/security-redblue/dry-run.mjs
  (20/20): it feeds KNOWN-cheating fixtures (unrun step, artifact-less step, closed-without-guardrail,
  auto-fixed red-line) and asserts each goes RED/INCOMPLETE, and drives the real asset-surface-scan through
  its --test-fixture seam to prove a planted NEW subdomain is surfaced. To exercise LIVE: (1) run the blue
  scouts + verify:* + E2E replay against staging, (2) spin the disposable Kali VM + run runbook §3 (a)-(e),
  (3) ingest each finding through evaluateRun, (4) land guardrail+ledger or queue council per disposition.

build_status: BUILT+CERTIFIED (anti-cheat dry-run 20/20 green, 2026-07-02); blue arm scripts live + invokable; RED arm is human-gated (not yet run against a live staging engagement).
