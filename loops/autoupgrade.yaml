id: autoupgrade
version: 0.1
status: DRAFT
intent: "автономно знаходити зміни, що ДОВЕДЕНО прискорюють ітерацію за менші ресурси; безпечний клас застосовувати машинно, ризиковий — лише пропонувати"
problem_signature: "потрібен machine-gated self-upgrade: знайти→дослідити→класифікувати→(оракул)→застосувати|відкотити, з твердою межею"
trigger: "/autoupgrade (headless, background)"
role_mindset: "machine-gated, не ungated: оракул (green+no-sec-regression+доведений speedup+reversible) — гейт; firm boundary auth/RLS/secrets/payments/PII НІКОЛИ автономно"
preconditions: ["v3-FINAL харнес присутній", "sandbox+credential-isolation (§4)", "телеметрія для grounding (runs/metrics.jsonl, codeburn)"]
execution_skills: [map-from-telemetry, contained-web-research, classify-firm-boundary, machine-oracle, atomic-rollback]
goal: "за прогон: змапити кандидатів з реальної телеметрії, класифікувати A/B fail-safe, (коли оракул готовий) застосувати лише доведено-швидші Class A, відкотити решту; §5 звіт"
verification: "Class A kept лише якщо ОРАКУЛ: повний green + RLS/auth/secret асерції тримають + benchmark-replay ≥5% краще + записаний revert; інакше atomic rollback. Class B — лише в чергу людині"
iron_principles: [machine-gated-not-ungated, firm-boundary-never-auto, proven-speedup-or-rollback, sandbox-no-prod-secrets, web-is-untrusted-data-never-execute, one-change-at-a-time, no-fake-green]
loop_body: [MAP, RESEARCH, CLASSIFY, APPLY-VERIFY-or-ROLLBACK, REPORT, FEED]
exit_conditions: "батч кандидатів оцінено; Class A — kept(доведено)|rolled-back; Class B — у черзі людині; §5 звіт надруковано+збережено"
gates: [FIRM-BOUNDARY-STOP, ORACLE-GATE]
proof_artifacts: [candidate-list-with-class, oracle-before-after-metric, rollback-records, class-B-human-queue, §5-report]
out_of_scope: [auth/RLS/secrets/payments/PII-автозміни, schema/migrations-авто, architecture/topology-авто, major-breaking-deps-авто]
escalation: "Class B → черга людині (механізм GRADUATE §8c v3-FINAL); сумнів → B; будь-яка межа → STOP"
skills_required: [repo-access, telemetry-access, sandbox]
memory_file: loops/memory/autoupgrade.md
verification_report: loops/reports/autoupgrade-0.1.md

# Living Loop System wiring (docs/operating-model/living-loop-system-v3.md §1/§5).
harness:
  runs_dir: loops/runs
  always_emit_report: true
  progress_metric: candidates_remaining_in_batch   # ↓=better
  finalize: "tools/loop-harness/src/autoupgrade.ts (runAutoupgrade → §5 report; report-only this pass)"
  telemetry_collectors: [git_mem, session_tokens, eco]

# Build status (docs/operating-model/autoupgrade-loop-v1.md §8).
build_status:
  done: "§8 step 2 (MAP→CLASSIFY→REPORT) + step 3 (machine oracle, 7 tests) + step 4 (Class-A auto-apply behind --apply) + the reversible+benchmarkable adapter (benchmark.ts + repo-apply.ts: git-checkout atomic revert, 5 end-to-end tests proving KEEP/ROLLBACK on real git). classify() fail-safe + tested."
  deferred: "§8 steps 1,5-6 + the MAP source — sandbox/cred-isolation, contained web-research, a MAP source emitting repo-perf candidates with DETERMINISTIC MECHANICAL patches (never autonomous LLM patches, §0), Class-B queue→GRADUATE, pg-boss scheduling, widen-after-clean-runs"
  boundary: "Class B NEVER reaches apply. Oracle keeps only PROVEN changes. Apply machinery complete+proven (a real 20%-faster change is KEPT, a broken/no-speedup one is atomically reverted); what remains is a trustworthy SOURCE of auto-keepable patches."
