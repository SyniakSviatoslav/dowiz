id: incident-recovery
version: 0.1
status: DRAFT
intent: "живий збій: стабілізувати (без втрати замовлень) → корінь → фікс → детекція → post-mortem"
problem_signature: "живий збій/деградація зараз; користувачі/замовлення під загрозою"
trigger: "/incident <що падає>"
role_mindset: "черговий інженер: спершу зупинити кровотечу зворотними діями, тоді шукати корінь"
preconditions: ["доступ до live-сигналів (health/errors/alerts)", "fallback/degradation (Етап 33) і flag/scaling-gate доступні"]
execution_skills: [triage-stabilize, observability-read, root-cause-trace, minimal-fix, postmortem-author]
goal: "сервіс стабілізовано (degraded-not-down, нуль втрачених замовлень) → корінь → постійний фікс → детекція/алерт → post-mortem"
verification: "health назад у green/degraded; нуль втрачених замовлень (fallback тримає); після фіксу повна зелень; контрольований rollback доведено; додано алерт/тест; post-mortem записано"
iron_principles: [stabilize-before-root-cause, no-data-loss-order-survives, human-authority-no-autoban, reversible-actions-first, blameless-postmortem, no-fake-green]
loop_body: [SENSE, DIAGNOSE, ACT, VERIFY, REPEAT]
exit_conditions: "ВСІ: стабілізовано (degraded-not-down, замовлення цілі); корінь доведено; постійний фікс приземлено; детекція/алерт або тест додано; контрольований rollback перевірено; post-mortem у docs/incidents/"
gates: [STOP-STABILIZED, STOP-FIX]
proof_artifacts: [incident-timeline, stabilization-evidence-health-orders, root-evidence, added-alert-or-test, postmortem]
out_of_scope: [ризиковані-зміни-у-фазі-стабілізації, деструктивні-дії, автобан/авто-покарання-кур'єра]
escalation: "постійний фікс на серйозній поверхні → ПІСЛЯ стабілізації через ескалацію людині (post-incident)"
skills_required: [repo-access, observability, flag-control]
memory_file: loops/memory/incident-recovery.md
verification_report: loops/reports/incident-recovery-0.1.md
