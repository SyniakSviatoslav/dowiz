<!DOCTYPE html>
<html lang="sq" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Your Order — DeliveryOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --brand-primary:#ea4f16;--brand-primary-hover:#ffa12e;--brand-primary-light:rgba(234,79,22,0.12);--brand-accent:#2a2a2a;--brand-bg:#121212;--brand-surface:#1e1e1e;--brand-surface-raised:#2a2a2a;--brand-text:#ffffff;--brand-text-muted:#a8a8a8;--brand-border:#2c2c2c;--brand-font-heading:'Inter',sans-serif;--brand-font-body:'Inter',sans-serif;--brand-radius:12px;--brand-radius-sm:8px;--brand-radius-btn:78px;--color-success:#059669;--color-warning:#D97706;--color-danger:#DC2626;--color-info:#2563EB; }
    @media (prefers-color-scheme:dark){:root{--brand-bg:#0F172A;--brand-surface:#1E293B;--brand-surface-raised:#263548;--brand-text:#F1F5F9;--brand-text-muted:#94A3B8;--brand-border:#334155;--brand-primary-light:rgba(234,79,22,0.15);--brand-accent:#1E1A14;}}
    body { font-family:var(--brand-font-body);background:var(--brand-bg);color:var(--brand-text);-webkit-font-smoothing:antialiased; }
    button{transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),background-color 0.2s ease}
    button:active{transform:scale(0.97)}
    textarea:focus{outline:none;border-color:var(--brand-primary)!important}
    .star-btn{font-size:36px;line-height:1;cursor:pointer;transition:transform 0.15s,color 0.15s;color:var(--brand-border);background:none;border:none;padding:0}
    .star-btn.active{color:var(--color-warning)}
    .star-btn:hover{transform:scale(1.15);color:var(--color-warning)}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:fadeSlideUp 0.3s ease both}
    @media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body class="min-h-screen">
  <div class="w-full max-w-[390px] mx-auto min-h-screen flex flex-col" style="background:var(--brand-bg)">
    <header class="h-[56px] border-b flex items-center justify-between px-4 shrink-0" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <button onclick="history.back()" class="min-w-[44px] min-h-[44px] -ml-2 rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text)"><i class="ti ti-arrow-left text-[22px]"></i></button>
      <h1 class="text-[16px] font-bold" style="color:var(--brand-text)">Rate Order</h1>
      <button onclick="cycleTheme()" class="min-w-[44px] min-h-[44px] rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text-muted)"><i class="ti ti-palette text-[18px]"></i></button>
    </header>

    <div class="flex-1 px-6 pt-8 animate-in">
      <div class="text-center mb-8">
        <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4" style="background:var(--brand-primary-light);color:var(--brand-primary);font-size:36px">🎉</div>
        <h2 class="text-[24px] font-bold mb-2" style="font-family:var(--brand-font-heading);color:var(--brand-text)">Enjoy your meal?</h2>
        <p class="text-[14px]" style="color:var(--brand-text-muted)">Rate the delivery experience and help us improve</p>
      </div>

      <div class="mb-8">
        <h3 class="text-[13px] font-bold mb-3 text-center" style="color:var(--brand-text)">Overall Rating</h3>
        <div class="flex justify-center gap-2 mb-2" id="starRating">
          <button class="star-btn" data-idx="0">★</button>
          <button class="star-btn" data-idx="1">★</button>
          <button class="star-btn" data-idx="2">★</button>
          <button class="star-btn" data-idx="3">★</button>
          <button class="star-btn" data-idx="4">★</button>
        </div>
        <p class="text-[13px] text-center font-medium" id="ratingLabel" style="color:var(--brand-text-muted)">Tap to rate</p>
      </div>

      <div class="mb-6">
        <h3 class="text-[13px] font-bold mb-3" style="color:var(--brand-text)">How was your delivery?</h3>
        <div class="flex gap-2 flex-wrap">
          <button class="chip chip-muted" onclick="toggleTag(this)">On time</button>
          <button class="chip chip-muted" onclick="toggleTag(this)">Friendly courier</button>
          <button class="chip chip-muted" onclick="toggleTag(this)">Good packaging</button>
          <button class="chip chip-muted" onclick="toggleTag(this)">Portion size</button>
          <button class="chip chip-muted" onclick="toggleTag(this)">Temperature</button>
          <button class="chip chip-muted" onclick="toggleTag(this)">Taste</button>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="text-[13px] font-bold mb-2" style="color:var(--brand-text)">Leave a comment (optional)</h3>
        <textarea rows="3" placeholder="Share your experience..." class="w-full border rounded-[12px] p-4 text-[14px] transition-colors resize-none" style="background:var(--brand-surface-raised);border-color:var(--brand-border);color:var(--brand-text)"></textarea>
      </div>

      <div class="mb-4 flex items-center justify-between p-4 rounded-[12px] border" style="background:var(--brand-surface);border-color:var(--brand-border)">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:var(--brand-primary-light);color:var(--brand-primary)"><i class="ti ti-coin text-[18px]"></i></div>
          <div>
            <div class="text-[14px] font-medium" style="color:var(--brand-text)">Tip your courier</div>
            <div class="text-[11px]" style="color:var(--brand-text-muted)">100% goes to Ardit</div>
          </div>
        </div>
        <div class="flex gap-1">
          <button onclick="selectTip(this,50)" class="px-3 min-h-[44px] rounded-full text-[12px] font-medium border" style="border-color:var(--brand-border);color:var(--brand-text)">50</button>
          <button onclick="selectTip(this,100)" class="px-3 min-h-[44px] rounded-full text-[12px] font-medium" style="background:var(--brand-primary);color:#fff;border:2px solid var(--brand-primary)">100</button>
          <button onclick="selectTip(this,200)" class="px-3 min-h-[44px] rounded-full text-[12px] font-medium border" style="border-color:var(--brand-border);color:var(--brand-text)">200</button>
        </div>
      </div>

      <button onclick="submitReview()" id="submitBtn" class="w-full h-[52px] rounded-[78px] text-white font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97] transition-all" style="background:var(--brand-primary)">
        Submit Review
      </button>
    </div>

    <div class="flex justify-center py-4"><div class="w-[134px] h-[5px] rounded-full" style="background:var(--brand-text);opacity:0.15"></div></div>
  </div>

  <script>
    const PRESETS = {
      "Food Dark":{ "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic":{ "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":{ "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":{ "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":{ "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":{ "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":{ "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS); let currentThemeIdx = 0;
    function applyPreset(name) { const p=PRESETS[name]||PRESETS['Food Dark']; const r=document.documentElement.style; Object.entries(p).forEach(([k,v])=>r.setProperty(k,v)); localStorage.setItem('dos_mockup_theme',name); }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Food Dark');

    let rating = 0;
    const labels = ['Poor','Fair','Good','Very Good','Excellent'];

    document.querySelectorAll('.star-btn').forEach((btn, idx) => {
      btn.addEventListener('click', () => setRating(idx + 1));
    });

    function setRating(val) {
      rating = val;
      document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('active', i < val));
      document.getElementById('ratingLabel').textContent = labels[val - 1];
    }

    function toggleTag(el) {
      el.classList.toggle('chip-primary');
      el.classList.toggle('chip-muted');
    }

    let selectedTip = 100;
    function selectTip(el, amount) {
      selectedTip = amount;
      document.querySelectorAll('[onclick*="selectTip"]').forEach(b => { b.style.background = 'transparent'; b.style.color = 'var(--brand-text)'; b.style.borderColor = 'var(--brand-border)'; b.style.borderWidth = '1px'; });
      el.style.background = 'var(--brand-primary)'; el.style.color = '#fff'; el.style.borderColor = 'var(--brand-primary)'; el.style.borderWidth = '2px';
    }

    function submitReview() {
      if (rating === 0) { alert('Please select a rating'); return; }
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Submitting...';
      btn.style.opacity = '0.6';
      setTimeout(() => { window.location.href = '19-restaurant-discovery.html'; }, 1200);
    }
  </script>
</body>
</html>
