<!DOCTYPE html>
<html lang="sq" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — DeliveryOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="mock-data.js"></script>
  <style>
    :root { --brand-primary:#ea4f16;--brand-primary-hover:#ffa12e;--brand-primary-light:rgba(234,79,22,0.12);--brand-accent:#2a2a2a;--brand-bg:#121212;--brand-surface:#1e1e1e;--brand-surface-raised:#2a2a2a;--brand-text:#ffffff;--brand-text-muted:#a8a8a8;--brand-border:#2c2c2c;--brand-font-heading:'Inter',sans-serif;--brand-font-body:'Inter',sans-serif;--brand-radius:12px;--brand-radius-sm:8px;--brand-radius-btn:78px;--color-success:#059669;--color-warning:#D97706;--color-danger:#DC2626;--color-info:#2563EB; }
    @media (prefers-color-scheme:dark){:root{--brand-bg:#0F172A;--brand-surface:#1E293B;--brand-surface-raised:#263548;--brand-text:#F1F5F9;--brand-text-muted:#94A3B8;--brand-border:#334155;--brand-primary-light:rgba(234,79,22,0.15);--brand-accent:#1E1A14;}}
    body { font-family:var(--brand-font-body);background:var(--brand-bg);color:var(--brand-text);-webkit-font-smoothing:antialiased; }
    body.embed-mode .embed-hidden { display: none !important; }
    button,.interactive-card{transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),background-color 0.2s ease,box-shadow 0.2s ease,border-color 0.2s ease}
    button:active{transform:scale(0.97)}
    .hide-scrollbar::-webkit-scrollbar{display:none}
    input:focus{outline:none;border-color:var(--brand-primary)!important}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body class="min-h-screen pb-24">
  <div class="w-full max-w-[390px] mx-auto min-h-screen" style="background:var(--brand-bg)">
    <header class="sticky top-0 z-50 pt-2 pb-3 px-4 border-b" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <div class="flex items-center gap-2 mb-2">
        <button onclick="history.back()" class="min-w-[44px] min-h-[44px] rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text)"><i class="ti ti-arrow-left text-[22px]"></i></button>
        <button onclick="cycleTheme()" class="min-w-[44px] min-h-[44px] rounded-full flex items-center justify-center ml-auto active:scale-[0.97]" style="color:var(--brand-text-muted)"><i class="ti ti-palette text-[18px]"></i></button>
      </div>
      <div class="search-bar relative">
        <i class="ti ti-search absolute left-4 top-1/2 -translate-y-1/2" style="color:var(--brand-text-muted);font-size:18px;pointer-events:none"></i>
        <input type="text" id="searchInput" placeholder="Search menu items, restaurants..." class="w-full h-[48px] pl-11 pr-10 rounded-[78px] text-[15px] font-medium border transition-colors" style="background:var(--brand-surface-raised);border-color:var(--brand-border);color:var(--brand-text)" autofocus oninput="performSearch(this.value)">
        <button onclick="clearSearch()" id="clearBtn" class="absolute right-3 top-1/2 -translate-y-1/2 hidden" style="color:var(--brand-text-muted)"><i class="ti ti-x text-[18px]"></i></button>
      </div>
    </header>

    <div class="px-4 pt-4" id="recentSection">
      <h3 class="text-[12px] font-bold uppercase tracking-wider mb-3" style="color:var(--brand-text-muted)">Recent Searches</h3>
      <div class="flex gap-2 flex-wrap mb-4">
        <button class="chip chip-muted" onclick="document.getElementById('searchInput').value='ramen';performSearch('ramen')"><i class="ti ti-clock text-[12px]"></i> ramen</button>
        <button class="chip chip-muted" onclick="document.getElementById('searchInput').value='sushi';performSearch('sushi')"><i class="ti ti-clock text-[12px]"></i> sushi</button>
        <button class="chip chip-muted" onclick="document.getElementById('searchInput').value='maki';performSearch('maki')"><i class="ti ti-clock text-[12px]"></i> maki</button>
      </div>

      <h3 class="text-[12px] font-bold uppercase tracking-wider mb-3" style="color:var(--brand-text-muted)">Popular Items</h3>
      <div class="flex flex-col gap-2" id="popularItems"></div>
    </div>

    <div class="px-4 pt-4 hidden" id="resultsSection">
      <div class="flex items-center justify-between mb-3 gap-2 flex-wrap">
        <span class="text-[13px] whitespace-nowrap" style="color:var(--brand-text-muted)"><span id="resultCount">0</span> results</span>
        <button class="chip chip-muted text-[11px] whitespace-nowrap"><i class="ti ti-filter text-[12px]"></i> Filter</button>
      </div>
      <div class="flex flex-col gap-2" id="resultsList"></div>
    </div>

    <div id="emptyResults" class="empty-state hidden">
      <div class="empty-state-icon"><i class="ti ti-search-off text-[28px]"></i></div>
      <h3 class="empty-state-title">No results found</h3>
      <p class="empty-state-desc">Try different keywords or browse categories</p>
    </div>

    <nav class="embed-hidden fixed bottom-0 left-0 right-0 max-w-[390px] mx-auto z-50 h-[64px] flex items-center justify-around gap-0 border-t" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <a href="19-restaurant-discovery.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-home-2 text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Home</span></a>
      <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-primary)"><i class="ti ti-search text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Search</span></button>
      <a href="23-order-history.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-shopping-bag text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Orders</span></a>
      <a href="25-favorites.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-bookmark text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Saved</span></a>
      <a href="22-user-profile.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-user text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Profile</span></a>
    </nav>
  </div>

  <script>
    if (window.location.search.includes('embed=true')) { document.body.classList.add('embed-mode'); }
    const PRESETS = {
      "Food Dark":{ "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic":{ "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":{ "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":{ "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":{ "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":{ "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":{ "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS); let currentThemeIdx = 0;
    function applyPreset(name) { const p=PRESETS[name]||PRESETS['Food Dark']; const r=document.documentElement.style; Object.entries(p).forEach(([k,v])=>r.setProperty(k,v)); localStorage.setItem('dos_mockup_theme',name); }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Food Dark');

    const popularItems = [
      { name:'Dragon Roll', restaurant:'Dubin & Sushi', price:850 },
      { name:'Tonkotsu Ramen', restaurant:'Dubin & Sushi', price:350 },
      { name:'Salmon Sashimi ×5', restaurant:'Dubin & Sushi', price:680 },
      { name:'Margherita', restaurant:'Pizza Roma', price:850 },
      { name:'Miso Soup', restaurant:'Dubin & Sushi', price:240 },
    ];

    const allItems = [
      ...popularItems,
      { name:'Spicy Tuna Roll', restaurant:'Dubin & Sushi', price:780 },
      { name:'Rainbow Roll', restaurant:'Dubin & Sushi', price:920 },
      { name:'Chicken Ramen', restaurant:'Dubin & Sushi', price:680 },
      { name:'Matcha Latte', restaurant:'Dubin & Sushi', price:280 },
      { name:'Mochi Ice Cream ×3', restaurant:'Dubin & Sushi', price:380 },
      { name:'Matcha Cheesecake', restaurant:'Dubin & Sushi', price:340 },
      { name:'Yakitori Skewers ×4', restaurant:'Dubin & Sushi', price:560 },
      { name:'Edamame', restaurant:'Dubin & Sushi', price:280 },
    ];

    function renderPopular() {
      const el = document.getElementById('popularItems');
      el.innerHTML = popularItems.map(item => `<div class="flex items-center justify-between p-3 rounded-[8px] cursor-pointer active:opacity-60 transition-opacity" style="background:var(--brand-surface-raised)" onclick="document.getElementById('searchInput').value='${item.name}';performSearch('${item.name}')">
        <div class="flex items-center gap-3">
          <i class="ti ti-flame" style="color:var(--brand-text-muted);font-size:16px"></i>
          <div><div class="text-[14px] font-medium" style="color:var(--brand-text)">${item.name}</div><div class="text-[11px]" style="color:var(--brand-text-muted)">${item.restaurant}</div></div>
        </div>
        <span class="text-[13px] font-bold" style="color:var(--brand-primary)">${item.price} ALL</span>
      </div>`).join('');
    }

    function performSearch(q) {
      const query = q.trim().toLowerCase();
      const recent = document.getElementById('recentSection');
      const results = document.getElementById('resultsSection');
      const empty = document.getElementById('emptyResults');
      const list = document.getElementById('resultsList');
      const clearBtn = document.getElementById('clearBtn');

      clearBtn.classList.toggle('hidden', !query);

      if (!query) { recent.classList.remove('hidden'); results.classList.add('hidden'); empty.classList.add('hidden'); return; }

      recent.classList.add('hidden');
      const matches = allItems.filter(i => i.name.toLowerCase().includes(query) || i.restaurant.toLowerCase().includes(query));

      if (matches.length === 0) { results.classList.add('hidden'); empty.classList.remove('hidden'); return; }

      results.classList.remove('hidden');
      empty.classList.add('hidden');
      document.getElementById('resultCount').textContent = matches.length;
      list.innerHTML = matches.map(item => `<div class="flex items-center justify-between p-3 rounded-[8px] border cursor-pointer active:opacity-60 transition-opacity" style="background:var(--brand-surface);border-color:var(--brand-border)" onclick="window.location.href='01-menu-client.html'">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-[8px] flex items-center justify-center text-[18px]" style="background:var(--brand-surface-raised)"><i class="ti ti-photo"></i></div>
          <div><div class="text-[14px] font-medium" style="color:var(--brand-text)">${item.name}</div><div class="text-[11px]" style="color:var(--brand-text-muted)">${item.restaurant}</div></div>
        </div>
        <span class="text-[13px] font-bold" style="color:var(--brand-primary)">${item.price} ALL</span>
      </div>`).join('');
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      performSearch('');
      document.getElementById('searchInput').focus();
    }

    renderPopular();
    // Check URL for pre-filled query
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) { document.getElementById('searchInput').value = q; performSearch(q); }
  </script>
</body>
</html>
