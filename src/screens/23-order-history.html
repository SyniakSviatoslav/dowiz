<!DOCTYPE html>
<html lang="sq" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History — DeliveryOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="mock-data.js"></script>
  <style>
    :root { --brand-primary:#ea4f16;--brand-primary-hover:#ffa12e;--brand-primary-light:rgba(234,79,22,0.12);--brand-accent:#2a2a2a;--brand-bg:#121212;--brand-surface:#1e1e1e;--brand-surface-raised:#2a2a2a;--brand-text:#ffffff;--brand-text-muted:#a8a8a8;--brand-border:#2c2c2c;--brand-font-heading:'Inter',sans-serif;--brand-font-body:'Inter',sans-serif;--brand-radius:12px;--brand-radius-sm:8px;--brand-radius-btn:78px;--color-success:#059669;--color-warning:#D97706;--color-danger:#DC2626;--color-info:#2563EB;--status-pending:#D97706;--status-confirmed:#2563EB;--status-preparing:#F59E0B;--status-ready:#0D9488;--status-in-delivery:#3B82F6;--status-delivered:#059669;--status-cancelled:#DC2626; }
    @media (prefers-color-scheme:dark){:root{--brand-bg:#0F172A;--brand-surface:#1E293B;--brand-surface-raised:#263548;--brand-text:#F1F5F9;--brand-text-muted:#94A3B8;--brand-border:#334155;--brand-primary-light:rgba(234,79,22,0.15);--brand-accent:#1E1A14;}}
    body { font-family:var(--brand-font-body);background:var(--brand-bg);color:var(--brand-text);-webkit-font-smoothing:antialiased; }
    body.embed-mode .embed-hidden { display: none !important; }
    button,.interactive-card{transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),background-color 0.2s ease,box-shadow 0.2s ease,border-color 0.2s ease}
    button:active{transform:scale(0.97)}
    .hide-scrollbar::-webkit-scrollbar{display:none}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .order-item{transition:background 0.15s;cursor:pointer}
    .order-item:active{opacity:0.7}
    @media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body class="min-h-screen pb-24">
  <div class="w-full max-w-[390px] mx-auto min-h-screen" style="background:var(--brand-bg)">
    <header class="sticky top-0 z-50 h-[56px] border-b flex items-center justify-between px-4" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <button onclick="history.back()" class="min-w-[44px] min-h-[44px] -ml-2 rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text)"><i class="ti ti-arrow-left text-[22px]"></i></button>
      <h1 class="text-[16px] font-bold" style="color:var(--brand-text)">My Orders</h1>
      <button onclick="cycleTheme()" class="min-w-[44px] min-h-[44px] rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text-muted)"><i class="ti ti-palette text-[18px]"></i></button>
    </header>

    <div class="px-4 pt-4 flex gap-2 overflow-x-auto hide-scrollbar pb-2">
      <button class="chip chip-primary whitespace-nowrap" onclick="filterOrders('all')">All</button>
      <button class="chip chip-muted whitespace-nowrap" onclick="filterOrders('active')">Active</button>
      <button class="chip chip-muted whitespace-nowrap" onclick="filterOrders('delivered')">Delivered</button>
      <button class="chip chip-muted whitespace-nowrap" onclick="filterOrders('cancelled')">Cancelled</button>
    </div>

    <div class="px-4 pt-2 flex flex-col gap-3" id="orderList"></div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-state-icon"><i class="ti ti-shopping-bag-off text-[28px]"></i></div>
      <h3 class="empty-state-title">No orders yet</h3>
      <p class="empty-state-desc">Your order history will appear here</p>
      <button class="empty-state-btn" onclick="window.location.href='19-restaurant-discovery.html'">Browse Restaurants</button>
    </div>

    <nav class="embed-hidden fixed bottom-0 left-0 right-0 max-w-[390px] mx-auto z-50 h-[64px] flex items-center justify-around gap-0 border-t" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <a href="19-restaurant-discovery.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-home-2 text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Home</span></a>
      <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-search text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Search</span></button>
      <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-primary)"><i class="ti ti-shopping-bag text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Orders</span></button>
      <a href="25-favorites.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-bookmark text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Saved</span></a>
      <a href="22-user-profile.html" class="flex flex-col items-center gap-0.5 min-w-0 flex-1" style="color:var(--brand-text-muted)"><i class="ti ti-user text-[22px]"></i><span class="text-[10px] font-medium whitespace-nowrap">Profile</span></a>
    </nav>
  </div>

  <script>
    if (window.location.search.includes('embed=true')) { document.body.classList.add('embed-mode'); }
    const PRESETS = {
      "Food Dark":{ "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic":{ "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":{ "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":{ "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":{ "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":{ "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":{ "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS); let currentThemeIdx = 0;
    function applyPreset(name) { const p=PRESETS[name]||PRESETS['Food Dark']; const r=document.documentElement.style; Object.entries(p).forEach(([k,v])=>r.setProperty(k,v)); localStorage.setItem('dos_mockup_theme',name); }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Food Dark');

    const allOrders = [
      { id:'2301', status:'IN_DELIVERY', restaurant:'Dubin & Sushi', items:'Dragon Roll ×1, Chicken Ramen ×1, Sencha Green Tea ×2', total:1806, date:'Today, 20:14', payment:'Cash' },
      { id:'2298', status:'DELIVERED', restaurant:'Dubin & Sushi', items:'Spicy Tuna Roll ×2, Matcha Tea ×1', total:1850, date:'Yesterday, 19:30', payment:'Cash' },
      { id:'2292', status:'DELIVERED', restaurant:'Pizza Roma', items:'Margherita ×1, Tiramisu ×1', total:1250, date:'Apr 28, 21:00', payment:'Card' },
      { id:'2287', status:'CANCELLED', restaurant:'Dubin & Sushi', items:'Rainbow Roll ×2, Ramen ×1', total:2520, date:'Apr 25, 22:15', payment:'Cash' },
      { id:'2278', status:'DELIVERED', restaurant:'Green Bowl', items:'Kaiso Salad ×1, Yuzu Lemonade ×1', total:600, date:'Apr 22, 13:20', payment:'Card' },
      { id:'2265', status:'DELIVERED', restaurant:'Dubin & Sushi', items:'Salmon Sashimi ×5, Sake ×1', total:1160, date:'Apr 18, 20:45', payment:'Cash' },
    ];

    function getStatusConfig(status) {
      const map = {
        'IN_DELIVERY': { label:'In Delivery', cls:'status-in-delivery' },
        'DELIVERED': { label:'Delivered', cls:'status-delivered' },
        'CANCELLED': { label:'Cancelled', cls:'status-cancelled' },
        'PREPARING': { label:'Preparing', cls:'status-preparing' },
        'CONFIRMED': { label:'Confirmed', cls:'status-confirmed' },
        'PENDING': { label:'Pending', cls:'status-pending' },
      };
      return map[status] || { label:status, cls:'status-pending' };
    }

    function renderOrders(filter) {
      const list = document.getElementById('orderList');
      const empty = document.getElementById('emptyState');
      let filtered = allOrders;
      if (filter === 'active') filtered = allOrders.filter(o => ['PENDING','CONFIRMED','PREPARING','IN_DELIVERY'].includes(o.status));
      else if (filter === 'delivered') filtered = allOrders.filter(o => o.status === 'DELIVERED');
      else if (filter === 'cancelled') filtered = allOrders.filter(o => o.status === 'CANCELLED');

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      list.innerHTML = filtered.map(o => {
        const sc = getStatusConfig(o.status);
        return `<div class="order-item rounded-[12px] p-4 border animate-fade-slide-up" style="background:var(--brand-surface);border-color:var(--brand-border)" onclick="window.location.href='04-order-status.html'">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="font-mono text-[13px] font-medium" style="color:var(--brand-text)">#${o.id}</span>
              <span class="text-[11px]" style="color:var(--brand-text-muted)">${o.restaurant}</span>
            </div>
            <div class="${sc.cls} status-badge text-[10px]"><span class="status-dot"></span>${sc.label}</div>
          </div>
          <p class="text-[12px] mb-2" style="color:var(--brand-text-muted)">${o.items}</p>
          <div class="flex items-center justify-between pt-2 border-t" style="border-color:var(--brand-border)">
            <span class="text-[11px]" style="color:var(--brand-text-muted)">${o.date}</span>
            <div class="flex items-center gap-2">
              <span class="chip chip-muted text-[10px]">${o.payment}</span>
              <span class="font-bold text-[14px]" style="color:var(--brand-primary)">${o.total.toLocaleString()} ALL</span>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function filterOrders(filter) {
      document.querySelectorAll('.chip').forEach(c => { c.className = c.className.replace('chip-primary','chip-muted'); });
      event.target.className = 'chip chip-primary whitespace-nowrap';
      renderOrders(filter);
    }

    renderOrders('all');
  </script>
</body>
</html>
