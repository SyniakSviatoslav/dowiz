<!DOCTYPE html>
<html lang="sq" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeliveryOS — Courier Active Delivery</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="mock-data.js"></script>

  <style>
    :root {
      --brand-primary:        #0D9488;
      --brand-primary-hover:  #0A7567;
      --brand-primary-light:  #F0FDFA;
      --brand-accent:         #F0F9F8;
      --brand-bg:             #FFFFFF;
      --brand-surface:        #F8FFFE;
      --brand-text:           #134E4A;
      --brand-text-muted:     #6B7280;
      --brand-border:         #CCFBF1;
      --brand-font-heading:   'Cormorant Garamond', serif;
      --brand-font-body:      'DM Sans', sans-serif;
      --brand-sidebar:        #0F172A;
      --brand-radius:         24px;
      --brand-radius-sm:      12px;
      --brand-radius-btn:     32px;

      --color-success:  #059669;
      --color-warning:  #D97706;
      --color-danger:   #DC2626;
      --color-info:     #2563EB;
    }

    body {
      font-family: var(--brand-font-body);
      background-color: var(--brand-bg);
      color: var(--brand-text);
      -webkit-font-smoothing: antialiased;
    }

    .map-grid {
      background-image: linear-gradient(var(--brand-border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--brand-border) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .route-line {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: dash 2s ease-out forwards;
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
      /* Global Interactions */
    button, .interactive-card {
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    button:active, .interactive-card:active {
      transform: scale(0.97);
    }
    .interactive-card {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
      border-color: transparent;
    }
    .interactive-card:hover {
      transform: translateY(-3px);
      box-shadow:
        0 12px 32px color-mix(in srgb, var(--brand-primary) 4%, transparent),
        0 4px 8px color-mix(in srgb, var(--brand-primary) 2%, transparent);
    }
  </style>
</head>
<body class="h-screen overflow-hidden flex flex-col max-w-[560px] mx-auto bg-brand-surface relative shadow-2xl border-x border-brand-border">

  <!-- Status Bar (WakeLock & GeoStream) -->
  <div class="h-[44px] flex justify-between items-center px-4 shrink-0 z-20" style="background:var(--brand-sidebar)">
    <div class="flex items-center gap-1 opacity-70 text-white">
      <i class="ti ti-lock text-[12px]"></i>
      <span class="text-[12px]">Screen Active</span>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="cycleTheme()" class="min-w-[44px] min-h-[44px] rounded-full flex items-center justify-center active:scale-[0.97] text-white/70 hover:text-white" style="background:rgba(255,255,255,0.1)"><i class="ti ti-palette text-[13px]"></i></button>
      <div class="flex flex-col items-end">
      <div class="flex items-center gap-1.5 opacity-90">
        <span class="text-[12px] text-semantic-success font-bold">GPS ✓ 6m</span>
        <div class="w-1.5 h-1.5 rounded-full bg-semantic-success animate-pulse"></div>
      </div>
      <!-- Accuracy Indicator -->
      <div class="flex gap-[2px] mt-0.5">
        <div class="w-2.5 h-1 bg-semantic-success rounded-full"></div>
        <div class="w-2.5 h-1 bg-semantic-success rounded-full"></div>
        <div class="w-2.5 h-1 bg-semantic-success rounded-full"></div>
        <div class="w-2.5 h-1 bg-semantic-success rounded-full"></div>
      </div>
    </div>
    </div>
  </div>
  </div>

  <!-- Map Area -->
  <div class="h-[280px] bg-brand-bg map-grid w-full relative overflow-hidden shrink-0 z-10 opacity-90">
    <!-- Route Line -->
    <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
      <polyline class="route-line" points="50,220 180,120 220,130 273,56" fill="none" stroke="var(--color-info)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <!-- Destination Pin -->
    <div class="absolute top-[20%] right-[20%] -translate-x-1/2 -translate-y-full flex flex-col items-center">
      <div class="w-8 h-8 bg-semantic-danger rounded-full rounded-br-sm rotate-45 border-[3px] border-white shadow-md flex items-center justify-center">
        <i class="ti ti-home text-[14px] text-white -rotate-45"></i>
      </div>
    </div>
    <!-- Courier Marker -->
    <div class="absolute bottom-[20%] left-[20%] -translate-x-1/2 translate-y-1/2">
      <div class="w-10 h-10 rounded-full bg-brand-primary border-[3px] border-white shadow-lg flex items-center justify-center">
        <i class="ti ti-bike text-[18px] text-white"></i>
      </div>
    </div>
  </div>

  <!-- Background Warning -->
  <div style="background:color-mix(in srgb, var(--color-warning) 15%, transparent);border-color:color-mix(in srgb, var(--color-warning) 30%, transparent)" class="w-full px-4 py-2.5 flex items-center gap-2 z-10 shadow-sm shrink-0 border-y">
    <i class="ti ti-alert-triangle text-[16px]" style="color:var(--color-warning)"></i>
    <span class="text-[14px] font-medium" style="color:var(--brand-text-muted)"><i class="ti ti-alert-triangle"></i> App is in background — GPS may stop</span>
  </div>

  <!-- Bottom Sheet -->
  <div class="flex-1 bg-brand-bg rounded-t-[24px] -mt-[16px] z-20 relative p-5 flex flex-col shadow-[0_-8px_24px_rgba(0,0,0,0.05)] pb-[32px] overflow-y-auto">
    
    <!-- Drag Handle -->
    <div class="w-10 h-1 bg-brand-border rounded-full mx-auto mb-4"></div>

    <!-- Delivery Details -->
    <div class="flex-1">
      <h2 class="text-[14px] font-bold text-brand-text-muted uppercase tracking-wide mb-1">Delivery for</h2>
      <div class="flex items-center gap-2 mb-1">
        <span class="font-heading text-[22px] font-medium text-brand-text">Sara M.</span>
        <span class="px-2 py-0.5 bg-brand-surface border border-brand-border text-brand-text-muted text-[12px] font-bold rounded-sm tracking-wide">NEW</span>
      </div>
        <div onclick="openNavigation()" class="flex items-start gap-1.5 mt-3 cursor-pointer active:scale-[0.97] transition-all">
        <i class="ti ti-map-pin text-[18px] text-[var(--color-info)]"></i>
        <div class="flex flex-col">
          <span class="text-[18px] font-bold text-brand-text leading-tight tracking-tight">Rruga Barrikadave 22</span>
          <span class="text-[14px] text-brand-text-muted mt-1">Ap. 14, Kati 3</span>
        </div>
      </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="flex gap-2 mb-3 shrink-0">
      <button onclick="openNavigation('google')" class="flex-1 h-[52px] rounded-[12px] text-white font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97] transition-all shadow-sm" style="background:var(--brand-primary)">
        <i class="ti ti-navigation text-[18px]"></i> Maps
      </button>
      <button onclick="openNavigation('waze')" class="flex-1 h-[52px] rounded-[12px] font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97] transition-all shadow-sm border" style="background:var(--brand-surface);border-color:var(--brand-border);color:var(--brand-text)">
        <i class="ti ti-map-2 text-[18px]"></i> Waze
      </button>
    </div>

    <!-- ETA Row -->
    <div class="flex items-center gap-2 mb-4 shrink-0">
      <span class="text-[18px] font-bold text-brand-text">~8 min</span>
      <span class="text-[16px] font-medium text-brand-text-muted">· 1.8 km</span>
      <span class="w-1.5 h-1.5 rounded-full bg-color-info animate-pulse ml-1"></span>
    </div>

    <div class="w-full h-px bg-brand-border shrink-0 mb-4"></div>

    <!-- Customer Contact Button -->
    <button class="w-full h-[44px] rounded-brand-btn border border-brand-border bg-brand-surface text-brand-text flex items-center justify-center gap-2 hover:bg-brand-border transition-colors mb-4 shrink-0 font-bold text-[15px]">
      <i class="ti ti-phone text-[18px] text-brand-primary"></i> Call Customer
    </button>

    <!-- DELIVERY ACTION BUTTONS -->
    <div class="shrink-0 mb-2">
      <!-- State A: PREPARING -->
      <button id="btn-state-a" class="w-full h-[56px] rounded-brand-sm bg-semantic-warning text-white flex items-center justify-center gap-2 shadow-md hover:brightness-95 transition-all font-bold text-[16px]" onclick="transitionToDelivery()">
        <i class="ti ti-package text-[22px]"></i> Picked up order
      </button>
      
      <!-- State B: IN_DELIVERY -->
      <button id="btn-state-b" class="w-full h-[56px] rounded-brand-sm bg-brand-primary text-white hidden items-center justify-center gap-2 shadow-md hover:bg-brand-primary-hover transition-all font-bold text-[16px]" onclick="showSuccessOverlay()">
        <i class="ti ti-check text-[22px]"></i> Delivered
      </button>
    </div>

    <!-- Photo Upload -->
    <button class="w-full h-[44px] rounded-brand-sm bg-transparent text-brand-text-muted flex items-center justify-center gap-2 hover:bg-brand-surface transition-colors shrink-0 font-bold text-[14px]">
      <i class="ti ti-camera text-[18px]"></i> Photo proof (optional)
    </button>

  </div>
  
  <!-- Success Overlay -->
  <div id="successOverlay" class="absolute inset-0 bg-brand-surface/90 z-[100] hidden items-center justify-center p-6 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="bg-brand-bg rounded-brand border border-brand-border shadow-2xl p-8 w-full max-w-[320px] text-center transform scale-95 transition-transform duration-300" id="successCard">
      <div class="flex justify-center mb-5">
        <div class="w-20 h-20 bg-semantic-success/10 rounded-full flex items-center justify-center text-semantic-success">
          <i class="ti ti-check text-[40px]"></i>
        </div>
      </div>
      <h2 class="font-heading text-[24px] font-bold text-brand-text mb-2">Delivered!</h2>
      <p class="font-mono text-[14px] font-bold text-brand-text-muted mb-8">#2301 · Sara M.</p>
      <a href="15-courier-tasks.html" class="flex w-full h-[48px] rounded-brand-btn bg-brand-primary text-white font-bold text-[14px] hover:bg-brand-primary-hover shadow-sm items-center justify-center">
        Back to tasks
      </a>
    </div>
  </div>

  <script>
    // Theme Logic — 7 presets
    const PRESETS = {
      "Food Dark":{ "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic":{ "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":{ "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":{ "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":{ "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":{ "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":{ "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS);
    let currentThemeIdx = 0;
    function applyPreset(name) { const p=PRESETS[name]||PRESETS['Ocean Fresh']; const r=document.documentElement.style; Object.entries(p).forEach(([k,v])=>r.setProperty(k,v)); localStorage.setItem('dos_mockup_theme',name); }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Ocean Fresh');

    // Navigation — Maps & Waze deep links
    function openNavigation(app) {
      const address = encodeURIComponent('Rruga Barrikadave 22, Tiranë, Albania');
      if (app === 'waze') {
        window.open(`https://waze.com/ul?q=${address}&navigate=yes`, '_blank');
      } else {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${address}`, '_blank');
      }
    }

    // State Transition Logic
    function transitionToDelivery() {
      document.getElementById('btn-state-a').classList.replace('flex', 'hidden');
      document.getElementById('btn-state-b').classList.replace('hidden', 'flex');
    }

    function showSuccessOverlay() {
      const overlay = document.getElementById('successOverlay');
      const card = document.getElementById('successCard');
      overlay.classList.replace('hidden', 'flex');
      
      setTimeout(() => {
        overlay.classList.remove('opacity-0');
        card.classList.replace('scale-95', 'scale-100');
      }, 10);
    }
  </script>
</body>
</html>
