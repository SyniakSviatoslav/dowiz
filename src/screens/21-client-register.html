<!DOCTYPE html>
<html lang="sq" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — DeliveryOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --brand-primary:#ea4f16;--brand-primary-hover:#ffa12e;--brand-primary-light:rgba(234,79,22,0.12);--brand-accent:#2a2a2a;--brand-bg:#121212;--brand-surface:#1e1e1e;--brand-surface-raised:#2a2a2a;--brand-text:#ffffff;--brand-text-muted:#a8a8a8;--brand-border:#2c2c2c;--brand-font-heading:'Inter',sans-serif;--brand-font-body:'Inter',sans-serif;--brand-radius:12px;--brand-radius-sm:8px;--brand-radius-btn:78px;--color-success:#059669;--color-warning:#D97706;--color-danger:#DC2626;--color-info:#2563EB; }
    @media (prefers-color-scheme:dark){:root{--brand-bg:#0F172A;--brand-surface:#1E293B;--brand-surface-raised:#263548;--brand-text:#F1F5F9;--brand-text-muted:#94A3B8;--brand-border:#334155;--brand-primary-light:rgba(234,79,22,0.15);--brand-accent:#1E1A14;}}
    body { font-family:var(--brand-font-body);background:var(--brand-bg);color:var(--brand-text);-webkit-font-smoothing:antialiased; }
    button { transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),background-color 0.2s ease; }
    button:active{transform:scale(0.97)}
    input:focus{outline:none;border-color:var(--brand-primary)!important}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:fadeSlideUp 0.3s ease both}
    @media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="w-full max-w-[390px] mx-auto min-h-screen flex flex-col relative" style="background:var(--brand-bg)">
    <header class="h-[56px] flex items-center px-4 shrink-0">
      <button onclick="history.back()" class="min-w-[44px] min-h-[44px] -ml-2 rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text)"><i class="ti ti-arrow-left text-[22px]"></i></button>
      <button onclick="cycleTheme()" class="min-w-[44px] min-h-[44px] rounded-full flex items-center justify-center ml-auto active:scale-[0.97]" style="background:var(--brand-primary-light);color:var(--brand-primary)"><i class="ti ti-palette text-[16px]"></i></button>
    </header>

    <div class="flex-1 px-6 pt-4 animate-in">
      <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4" style="background:var(--brand-primary-light);color:var(--brand-primary)"><i class="ti ti-user-plus text-[24px]"></i></div>
      <h1 class="text-[28px] font-bold mb-2" style="font-family:var(--brand-font-heading);color:var(--brand-text)">Create Account</h1>
      <p class="text-[14px] mb-8" style="color:var(--brand-text-muted)">Join thousands enjoying fast delivery in Tirana</p>

      <div class="flex gap-3 mb-6">
        <button onclick="selectRole('client')" id="role-client" class="flex-1 h-[56px] rounded-[12px] border-2 flex items-center justify-center gap-2 text-[14px] font-medium transition-all" style="border-color:var(--brand-primary);background:var(--brand-primary-light);color:var(--brand-primary)">
          <i class="ti ti-shopping-bag text-[18px]"></i> Customer
        </button>
        <button onclick="selectRole('owner')" id="role-owner" class="flex-1 h-[56px] rounded-[12px] border-2 flex items-center justify-center gap-2 text-[14px] font-medium transition-all" style="border-color:var(--brand-border);background:transparent;color:var(--brand-text-muted)">
          <i class="ti ti-building-store text-[18px]"></i> Owner
        </button>
      </div>

      <div class="mb-4">
        <label class="text-[12px] font-medium mb-2 block" style="color:var(--brand-text-muted)">Full Name</label>
        <input type="text" id="regName" placeholder="Sara Mancini" class="w-full h-[52px] border rounded-[12px] px-4 text-[15px] font-medium transition-colors" style="background:var(--brand-surface-raised);border-color:var(--brand-border);color:var(--brand-text)">
      </div>
      <div class="mb-4">
        <label class="text-[12px] font-medium mb-2 block" style="color:var(--brand-text-muted)">Email (optional)</label>
        <input type="email" id="regEmail" placeholder="sara@example.com" class="w-full h-[52px] border rounded-[12px] px-4 text-[15px] font-medium transition-colors" style="background:var(--brand-surface-raised);border-color:var(--brand-border);color:var(--brand-text)">
      </div>
      <div class="mb-4">
        <label class="text-[12px] font-medium mb-2 block" style="color:var(--brand-text-muted)">Phone Number</label>
        <div class="flex items-center h-[52px] border rounded-[12px] px-4 transition-colors" style="background:var(--brand-surface-raised);border-color:var(--brand-border)">
          <span class="text-[14px] font-medium mr-2" style="color:var(--brand-text-muted)">+355</span>
          <div class="w-px h-6" style="background:var(--brand-border)"></div>
          <input type="tel" id="regPhone" placeholder="67 234 5678" class="flex-1 h-full bg-transparent border-none outline-none text-[16px] font-medium ml-3" style="color:var(--brand-text)" maxlength="9" inputmode="numeric">
        </div>
      </div>
      <div class="mb-4">
        <label class="text-[12px] font-medium mb-2 block" style="color:var(--brand-text-muted)">Password</label>
        <div class="relative">
          <input type="password" id="regPassword" placeholder="Min 8 characters" class="w-full h-[52px] border rounded-[12px] px-4 text-[15px] font-medium transition-colors pr-10" style="background:var(--brand-surface-raised);border-color:var(--brand-border);color:var(--brand-text)">
          <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2" style="color:var(--brand-text-muted)"><i id="passIcon" class="ti ti-eye text-[20px]"></i></button>
        </div>
      </div>

      <div class="flex items-start gap-3 mb-6 mt-4">
        <input type="checkbox" id="termsCheck" class="mt-0.5 w-4 h-4 rounded" style="accent-color:var(--brand-primary)">
        <label for="termsCheck" class="text-[12px]" style="color:var(--brand-text-muted)">I agree to the <a href="#" class="font-medium" style="color:var(--brand-primary)">Terms of Service</a> and <a href="#" class="font-medium" style="color:var(--brand-primary)">Privacy Policy</a></label>
      </div>
    </div>

    <div class="px-6 pb-8">
      <button onclick="register()" id="registerBtn" class="w-full h-[52px] rounded-[78px] text-white font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97] transition-all disabled:opacity-50 disabled:cursor-not-allowed" style="background:var(--brand-primary)">
        <span id="registerLabel">Create Account</span>
        <div class="spinner" id="registerSpinner"></div>
      </button>
      <p class="text-center mt-4 text-[13px]" style="color:var(--brand-text-muted)">
        Already have an account? <a href="20-client-login.html" style="color:var(--brand-primary);font-weight:500">Sign In</a>
      </p>
    </div>
  </div>

  <script>
    const PRESETS = {
      "Food Dark":{ "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic":{ "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":{ "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":{ "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":{ "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":{ "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":{ "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS);
    let currentThemeIdx = 0;
    function applyPreset(name) { const p=PRESETS[name]||PRESETS['Food Dark']; const r=document.documentElement.style; Object.entries(p).forEach(([k,v])=>r.setProperty(k,v)); localStorage.setItem('dos_mockup_theme',name); }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Food Dark');

    let selectedRole = 'client';
    function selectRole(role) {
      selectedRole = role;
      ['client','owner'].forEach(r => {
        const el = document.getElementById('role-'+r);
        if (r === role) { el.style.borderColor = 'var(--brand-primary)'; el.style.background = 'var(--brand-primary-light)'; el.style.color = 'var(--brand-primary)'; }
        else { el.style.borderColor = 'var(--brand-border)'; el.style.background = 'transparent'; el.style.color = 'var(--brand-text-muted)'; }
      });
    }

    function togglePassword() {
      const p = document.getElementById('regPassword');
      const icon = document.getElementById('passIcon');
      if (p.type === 'password') { p.type = 'text'; icon.className = 'ti ti-eye-off text-[20px]'; }
      else { p.type = 'password'; icon.className = 'ti ti-eye text-[20px]'; }
    }

    function register() {
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const pass = document.getElementById('regPassword').value;
      const terms = document.getElementById('termsCheck').checked;
      if (!name || phone.length < 6 || pass.length < 8 || !terms) return;
      const btn = document.getElementById('registerBtn');
      btn.disabled = true; document.getElementById('registerLabel').textContent = 'Creating...'; document.getElementById('registerSpinner').style.display = 'block';
      setTimeout(() => {
        localStorage.setItem('dos_client_name', name);
        localStorage.setItem('dos_client_phone', phone);
        localStorage.setItem('dos_client_logged_in', 'true');
        if (selectedRole === 'owner') window.location.href = '28-admin-login.html';
        else window.location.href = '19-restaurant-discovery.html';
      }, 1500);
    }
  </script>
</body>
</html>
