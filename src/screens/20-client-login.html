<!DOCTYPE html>
<html lang="sq" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DeliveryOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand-primary: #ea4f16; --brand-primary-hover: #ffa12e; --brand-primary-light: rgba(234,79,22,0.12);
      --brand-accent: #2a2a2a; --brand-bg: #121212; --brand-surface: #1e1e1e; --brand-surface-raised: #2a2a2a;
      --brand-text: #ffffff; --brand-text-muted: #a8a8a8; --brand-border: #2c2c2c;
      --brand-font-heading: 'Inter', sans-serif; --brand-font-body: 'Inter', sans-serif;
      --brand-radius: 12px; --brand-radius-sm: 8px; --brand-radius-btn: 78px;
      --color-success: #059669; --color-warning: #D97706; --color-danger: #DC2626; --color-info: #2563EB;
    }
    @media (prefers-color-scheme: dark) { :root { --brand-bg: #0F172A; --brand-surface: #1E293B; --brand-surface-raised: #263548; --brand-text: #F1F5F9; --brand-text-muted: #94A3B8; --brand-border: #334155; --brand-primary-light: rgba(234,79,22,0.15); --brand-accent: #1E1A14; } }
    body { font-family: var(--brand-font-body); background: var(--brand-bg); color: var(--brand-text); -webkit-font-smoothing: antialiased; }
    button, .interactive-card { transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background-color 0.2s ease; }
    button:active { transform: scale(0.97); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input:focus { outline: none; border-color: var(--brand-primary) !important; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .otp-input { width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 700; background: var(--brand-surface-raised); border: 1px solid var(--brand-border); border-radius: var(--brand-radius-sm); color: var(--brand-text); caret-color: var(--brand-primary); }
    .otp-input:focus { border-color: var(--brand-primary); outline: none; }
    .step { display: none; }
    .step.active { display: block; animation: fadeSlideUp 0.3s ease both; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { *,::before,::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="w-full max-w-[390px] mx-auto min-h-screen flex flex-col relative" style="background:var(--brand-bg)">
    <header class="h-[56px] flex items-center px-4 shrink-0">
      <button onclick="history.back()" class="min-w-[44px] min-h-[44px] -ml-2 rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text)"><i class="ti ti-arrow-left text-[22px]"></i></button>
    </header>

    <!-- Step 1: Phone Input -->
    <div id="step-phone" class="step active flex-1 flex flex-col px-6 pt-4">
      <div class="flex-1">
        <h1 class="text-[28px] font-bold mb-2" style="font-family:var(--brand-font-heading);color:var(--brand-text)">Sign In</h1>
        <p class="text-[14px] mb-8" style="color:var(--brand-text-muted)">Enter your phone number to receive a verification code</p>
        <div class="mb-4">
          <label class="text-[12px] font-medium mb-2 block" style="color:var(--brand-text-muted)">Phone Number</label>
          <div class="flex items-center h-[52px] border rounded-[12px] px-4 transition-colors" style="background:var(--brand-surface-raised);border-color:var(--brand-border)">
            <span class="text-[14px] font-medium mr-2" style="color:var(--brand-text-muted)">+355</span>
            <div class="w-px h-6" style="background:var(--brand-border)"></div>
            <input type="tel" id="phoneInput" placeholder="67 234 5678" class="flex-1 h-full bg-transparent border-none outline-none text-[16px] font-medium ml-3" style="color:var(--brand-text)" maxlength="9" inputmode="numeric">
          </div>
        </div>
        <div id="phoneError" class="text-[12px] font-medium hidden mb-4" style="color:var(--color-danger)"><i class="ti ti-alert-circle mr-1"></i>Please enter a valid phone number</div>
      </div>
      <div class="pb-8">
        <button onclick="sendOTP()" id="sendOTPBtn" class="w-full h-[52px] rounded-[78px] text-white font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97] transition-all" style="background:var(--brand-primary)">
          <span id="sendOTPLabel">Send Code</span>
          <div class="spinner" id="sendOTPSpinner"></div>
        </button>
        <p class="text-center mt-4 text-[13px]" style="color:var(--brand-text-muted)">
          By continuing you agree to our <a href="#" class="font-medium" style="color:var(--brand-primary)">Terms</a> &amp; <a href="#" class="font-medium" style="color:var(--brand-primary)">Privacy Policy</a>
        </p>
      </div>
    </div>

    <!-- Step 2: OTP Verification -->
    <div id="step-otp" class="step flex-1 flex flex-col px-6 pt-4">
      <div class="flex-1">
        <h1 class="text-[28px] font-bold mb-2" style="font-family:var(--brand-font-heading);color:var(--brand-text)">Enter Code</h1>
        <p class="text-[14px] mb-8" style="color:var(--brand-text-muted)">
          We sent a 6-digit code to <span id="otpPhoneDisplay" class="font-medium" style="color:var(--brand-text)">+355 67 234 5678</span>
        </p>
        <div class="flex justify-center gap-2.5 mb-6" id="otpContainer">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-idx="0" autofocus>
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-idx="1">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-idx="2">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-idx="3">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-idx="4">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-idx="5">
        </div>
        <div id="otpError" class="text-[12px] font-medium hidden text-center mb-4" style="color:var(--color-danger)"><i class="ti ti-alert-circle mr-1"></i>Invalid code. Try again.</div>
        <div class="text-center">
          <span class="text-[13px]" style="color:var(--brand-text-muted)">Resend in </span>
          <span id="otpTimer" class="text-[13px] font-medium" style="color:var(--brand-text)">0:30</span>
        </div>
        <button onclick="resendOTP()" id="resendOTPBtn" class="text-[13px] font-medium mx-auto mt-2 hidden hover:underline" style="color:var(--brand-primary)">Resend Code</button>
      </div>
      <div class="pb-8">
        <button onclick="verifyOTP()" id="verifyOTPBtn" class="w-full h-[52px] rounded-[78px] text-white font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97] transition-all disabled:opacity-50 disabled:cursor-not-allowed" style="background:var(--brand-primary)">
          <span id="verifyOTPLabel">Verify</span>
          <div class="spinner" id="verifyOTPSpinner"></div>
        </button>
        <button onclick="goBackToPhone()" class="w-full mt-3 h-[44px] text-[13px] font-medium" style="color:var(--brand-text-muted)"><i class="ti ti-arrow-left mr-1"></i> Change phone number</button>
      </div>
    </div>

    <!-- Step 3: Name -->
    <div id="step-name" class="step flex-1 flex flex-col px-6 pt-4">
      <div class="flex-1">
        <h1 class="text-[28px] font-bold mb-2" style="font-family:var(--brand-font-heading);color:var(--brand-text)">Your Name</h1>
        <p class="text-[14px] mb-8" style="color:var(--brand-text-muted)">How should we address you?</p>
        <div class="mb-4">
          <label class="text-[12px] font-medium mb-2 block" style="color:var(--brand-text-muted)">Full Name</label>
          <input type="text" id="nameInput" placeholder="Sara Mancini" class="w-full h-[52px] border rounded-[12px] px-4 text-[15px] font-medium transition-colors" style="background:var(--brand-surface-raised);border-color:var(--brand-border);color:var(--brand-text)" value="Sara">
        </div>
      </div>
      <div class="pb-8">
        <button onclick="completeLogin()" class="w-full h-[52px] rounded-[78px] text-white font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[0.97]" style="background:var(--brand-primary)">
          Continue
        </button>
      </div>
    </div>

    <div class="flex justify-center pb-4"><div class="w-[134px] h-[5px] rounded-full" style="background:var(--brand-text);opacity:0.15"></div></div>
  </div>

  <script>
    const PRESETS = {
      "Food Dark":{ "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic":{ "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":{ "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":{ "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":{ "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":{ "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":{ "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS);
    let currentThemeIdx = 0;
    function applyPreset(name) { const p=PRESETS[name]||PRESETS['Food Dark']; const r=document.documentElement.style; Object.entries(p).forEach(([k,v])=>r.setProperty(k,v)); localStorage.setItem('dos_mockup_theme',name); }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Food Dark');

    const steps = ['step-phone','step-otp','step-name'];
    let currentStep = 0;
    let otpTimerInterval;

    function showStep(idx) {
      steps.forEach((s,i) => document.getElementById(s).classList.toggle('active', i===idx));
      currentStep = idx;
    }

    function sendOTP() {
      const phone = document.getElementById('phoneInput').value.trim();
      const phoneError = document.getElementById('phoneError');
      if (phone.length < 6) { phoneError.classList.remove('hidden'); return; }
      phoneError.classList.add('hidden');
      const btn = document.getElementById('sendOTPBtn');
      btn.disabled = true;
      document.getElementById('sendOTPLabel').textContent = 'Sending...';
      document.getElementById('sendOTPSpinner').style.display = 'block';
      setTimeout(() => {
        btn.disabled = false;
        document.getElementById('sendOTPLabel').textContent = 'Send Code';
        document.getElementById('sendOTPSpinner').style.display = 'none';
        document.getElementById('otpPhoneDisplay').textContent = '+355 ' + phone.replace(/(\d{2})(\d{3})(\d{4})/, '$1 $2 $3');
        showStep(1);
        startOTPTimer();
        document.querySelector('.otp-input').focus();
      }, 1500);
    }

    function goBackToPhone() { showStep(0); clearInterval(otpTimerInterval); }

    function startOTPTimer() {
      let sec = 30;
      document.getElementById('otpTimer').textContent = '0:30';
      document.getElementById('resendOTPBtn').classList.add('hidden');
      clearInterval(otpTimerInterval);
      otpTimerInterval = setInterval(() => {
        sec--;
        if (sec <= 0) { clearInterval(otpTimerInterval); document.getElementById('otpTimer').textContent = '0:00'; document.getElementById('resendOTPBtn').classList.remove('hidden'); return; }
        document.getElementById('otpTimer').textContent = '0:' + sec.toString().padStart(2, '0');
      }, 1000);
    }

    function resendOTP() { startOTPTimer(); document.getElementById('resendOTPBtn').classList.add('hidden'); }

    document.querySelectorAll('.otp-input').forEach((input, idx, arr) => {
      input.addEventListener('input', (e) => {
        if (e.target.value && idx < arr.length - 1) arr[idx + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) arr[idx - 1].focus();
        if (e.key === 'Enter') verifyOTP();
      });
    });

    function verifyOTP() {
      const code = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
      if (code.length < 6) { document.getElementById('otpError').classList.remove('hidden'); return; }
      document.getElementById('otpError').classList.add('hidden');
      const btn = document.getElementById('verifyOTPBtn');
      btn.disabled = true;
      document.getElementById('verifyOTPLabel').textContent = 'Verifying...';
      document.getElementById('verifyOTPSpinner').style.display = 'block';
      setTimeout(() => {
        btn.disabled = false;
        document.getElementById('verifyOTPLabel').textContent = 'Verify';
        document.getElementById('verifyOTPSpinner').style.display = 'none';
        showStep(2);
        document.getElementById('nameInput').focus();
      }, 1200);
    }

    function completeLogin() {
      if (!document.getElementById('nameInput').value.trim()) return;
      localStorage.setItem('dos_client_name', document.getElementById('nameInput').value.trim());
      localStorage.setItem('dos_client_phone', document.getElementById('phoneInput').value.trim());
      localStorage.setItem('dos_client_logged_in', 'true');
      window.location.href = '19-restaurant-discovery.html';
    }

    document.getElementById('phoneInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendOTP(); });
    document.getElementById('nameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') completeLogin(); });
    document.getElementById('phoneInput').addEventListener('input', () => document.getElementById('phoneError').classList.add('hidden'));

    // Auto-login check
    if (localStorage.getItem('dos_client_logged_in') === 'true') {
      document.getElementById('phoneInput').value = localStorage.getItem('dos_client_phone') || '';
      document.getElementById('nameInput').value = localStorage.getItem('dos_client_name') || '';
    }
  </script>
</body>
</html>
