<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order #2301 - Dubin & Sushi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <script src="mock-data.js"></script>

  <style>
    :root {
      --brand-primary:        #ea4f16;
      --brand-primary-hover:  #ffa12e;
      --brand-primary-light:  rgba(234, 79, 22, 0.12);
      --brand-accent:         #2a2a2a;
      --brand-bg:             #121212;
      --brand-surface:        #1e1e1e;
      --brand-surface-raised: #2a2a2a;
      --brand-text:           #ffffff;
      --brand-text-muted:     #a8a8a8;
      --brand-border:         #2c2c2c;
      --brand-font-heading:   'Inter', sans-serif;
      --brand-font-body:      'Inter', sans-serif;
      --brand-radius:         12px;
      --brand-radius-sm:      8px;
      --brand-radius-btn:     78px;
      --color-success:  #059669;
      --color-warning:  #D97706;
      --color-danger:   #DC2626;
      --color-info:     #2563EB;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --brand-bg:             #0F172A;
        --brand-surface:        #1E293B;
        --brand-surface-raised: #263548;
        --brand-text:           #F1F5F9;
        --brand-text-muted:     #94A3B8;
        --brand-border:         #334155;
        --brand-primary-light:  rgba(234, 79, 22, 0.15);
        --brand-accent:         #1E1A14;
      }
    }
    body {
      font-family: var(--brand-font-body);
      background-color: var(--brand-bg);
      color: var(--brand-text);
      -webkit-font-smoothing: antialiased;
    }
    body.embed-mode .embed-hidden { display: none !important; }
    button, .interactive-card {
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease;
    }
    button:active { transform: scale(0.97); }
    .pulse-dot { animation: pulse-ring 2s infinite; }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--brand-primary) 50%, transparent); }
      70% { box-shadow: 0 0 0 10px color-mix(in srgb, var(--brand-primary) 0%, transparent); }
      100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--brand-primary) 0%, transparent); }
    }
    .draw-line {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 3s ease-in-out forwards;
    }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    details summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body style="background:var(--brand-bg)">

  <div class="max-w-md mx-auto min-h-screen relative pb-28" style="background:var(--brand-bg)">

    <!-- Header -->
    <header class="sticky top-0 z-50 h-[56px] border-b flex items-center px-4" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <div class="w-2 h-2 rounded-full mr-3 animate-pulse" style="background:var(--color-success)" title="Live"></div>
      <h1 class="text-[18px] font-bold" style="color:var(--brand-text);font-family:var(--brand-font-heading)">Dubin &amp; Sushi</h1>
      <span class="ml-2 text-[12px] mt-1 font-mono" style="color:var(--brand-text-muted)">#2301</span>
      <button onclick="cycleTheme()" class="min-w-[44px] min-h-[44px] p-2 ml-auto rounded-full flex items-center justify-center active:scale-[0.97]" style="color:var(--brand-text-muted)"><i class="ti ti-palette text-[18px]"></i></button>
      <div class="hidden" id="offline-banner">
        <a href="tel:+35569234567" class="text-[11px] font-medium px-2 py-1 rounded" style="background:rgba(220,38,38,0.1);color:var(--color-danger)">Offline - Call</a>
      </div>
    </header>

    <main class="px-4 pt-6">

      <!-- ETA -->
      <div class="text-center mb-6">
        <p class="text-[12px] font-medium uppercase tracking-widest mb-1" style="color:var(--brand-text-muted)">Estimated arrival</p>
        <h2 class="text-[32px] font-semibold leading-none" id="eta-display" style="color:var(--brand-primary);font-family:var(--brand-font-heading)">~14 minutes</h2>
      </div>

      <!-- Timeline -->
      <div class="mb-8 overflow-x-auto hide-scrollbar relative -mx-4 px-4">
        <div class="relative" style="min-width:460px">
        <div class="absolute top-4 left-4 right-4 h-1 z-0" style="background:var(--brand-border)"></div>
        <div class="absolute top-4 left-4 h-1 z-0 transition-all duration-1000" style="width:75%;background:var(--brand-primary)"></div>

        <div class="flex justify-between relative z-10 px-2">
          <div class="flex flex-col items-center gap-2">
            <div class="w-8 h-8 rounded-full text-white flex items-center justify-center shadow-sm" style="background:var(--color-success)">
              <i class="ti ti-check text-[16px]"></i>
            </div>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div class="w-8 h-8 rounded-full text-white flex items-center justify-center shadow-sm" style="background:var(--color-success)">
              <i class="ti ti-check text-[16px]"></i>
            </div>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div class="w-8 h-8 rounded-full text-white flex items-center justify-center shadow-sm" style="background:var(--color-success)">
              <i class="ti ti-check text-[16px]"></i>
            </div>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div class="w-8 h-8 rounded-full text-white flex items-center justify-center shadow-sm" style="background:var(--color-success)">
              <i class="ti ti-check text-[16px]"></i>
            </div>
          </div>
          <div class="flex flex-col items-center gap-2 relative">
            <div class="w-8 h-8 rounded-full text-white flex items-center justify-center shadow-md pulse-dot" style="background:var(--brand-primary)">
              <i class="ti ti-bike text-[16px]"></i>
            </div>
            <span class="absolute -bottom-6 text-[11px] font-bold whitespace-nowrap" style="color:var(--brand-primary)">Ardit is on the way</span>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center" style="background:var(--brand-surface);border-color:var(--brand-border);color:var(--brand-text-muted)">
              <i class="ti ti-home text-[16px]"></i>
            </div>
          </div>
        </div>
      </div>
      </div>

      <!-- Map -->
      <div class="w-full h-[240px] rounded-[12px] relative overflow-hidden border mb-4 mt-8" style="background:var(--brand-surface-raised);border-color:var(--brand-border)">
        <div class="absolute inset-0 opacity-10" style="background-image:linear-gradient(var(--brand-border) 1px,transparent 1px),linear-gradient(90deg,var(--brand-border) 1px,transparent 1px);background-size:20px 20px"></div>
        <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path d="M 20 80 Q 40 40 80 20" fill="none" stroke="var(--brand-primary)" stroke-width="2" stroke-dasharray="4" class="draw-line"/>
        </svg>
        <div class="absolute top-[20%] right-[20%] -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
          <div class="w-8 h-8 rounded-full text-white flex items-center justify-center shadow-md" style="background:var(--color-danger)">
            <i class="ti ti-home text-[16px]"></i>
          </div>
        </div>
        <div id="courier-marker" class="absolute bottom-[20%] left-[20%] -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center transition-all duration-1000 ease-linear">
          <div class="w-10 h-10 rounded-full text-white flex items-center justify-center shadow-lg border-2 relative" style="background:var(--brand-primary);border-color:var(--brand-bg)">
            <span class="text-[14px] font-bold">AK</span>
            <div class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full flex items-center justify-center shadow-sm" style="background:var(--brand-surface)">
              <i class="ti ti-bike text-[10px]" style="color:var(--brand-primary)"></i>
            </div>
          </div>
        </div>
        <div class="absolute bottom-3 left-3 backdrop-blur-sm px-3 py-1.5 rounded-full border shadow-sm flex items-center gap-1.5 z-30" style="background:rgba(255,255,255,0.08);border-color:var(--brand-border)">
          <div class="w-2 h-2 rounded-full animate-pulse" style="background:var(--brand-primary)"></div>
          <span class="text-[12px] font-bold" style="color:var(--brand-text)">1.8 km</span>
        </div>
      </div>

      <!-- Courier Info -->
      <div class="flex items-center justify-between border rounded-[12px] p-4 mb-6" style="background:var(--brand-surface);border-color:var(--brand-border)">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full text-white flex items-center justify-center font-bold text-[18px]" style="background:var(--brand-primary)">AK</div>
          <div>
            <h3 class="text-[15px] font-bold" style="color:var(--brand-text)">Ardit Kelmendi</h3>
            <p class="text-[12px] flex items-center gap-1" style="color:var(--brand-text-muted)">
              <i class="ti ti-star-filled text-yellow-400 text-[12px]"></i> 4.9 · Courier
            </p>
          </div>
        </div>
        <a href="tel:+35569555111" class="min-w-[44px] min-h-[44px] rounded-full border flex items-center justify-center transition-all active:scale-95" style="border-color:var(--brand-border);color:var(--brand-text)">
          <i class="ti ti-phone text-[20px]"></i>
        </a>
      </div>

      <!-- Order Details Accordion -->
      <div class="border rounded-[12px] mb-6 overflow-hidden" style="background:var(--brand-surface);border-color:var(--brand-border)">
        <details class="group">
          <summary class="flex items-center justify-between p-4 cursor-pointer list-none font-medium text-[14px]" style="color:var(--brand-text)">
            <span>Your order · <strong style="color:var(--brand-primary)">1,806 ALL</strong></span>
            <i class="ti ti-chevron-down transition-transform group-open:rotate-180" style="color:var(--brand-text-muted)"></i>
          </summary>
          <div class="px-4 pb-4 border-t pt-3 text-[13px]" style="background:var(--brand-surface-raised);border-color:var(--brand-border)">
            <div class="flex justify-between mb-2" style="color:var(--brand-text)"><span>Dragon Roll ×1</span><span>850 ALL</span></div>
            <div class="flex justify-between mb-2" style="color:var(--brand-text)"><span>Chicken Ramen ×1</span><span>680 ALL</span></div>
            <div class="flex justify-between mb-4" style="color:var(--brand-text)"><span>Sencha Green Tea ×2</span><span>360 ALL</span></div>
            <div class="flex justify-between font-bold pt-3 border-t" style="border-color:var(--brand-border);color:var(--brand-text)">
              <span>Total</span><span style="color:var(--brand-primary)">1,806 ALL</span>
            </div>
          </div>
        </details>
      </div>

      <!-- Feedback Form -->
      <div id="feedback-form" class="border rounded-[12px] p-5 mb-6 hidden opacity-0 transition-opacity duration-500" style="background:var(--brand-surface);border-color:var(--brand-border)">
        <h3 class="text-[20px] font-semibold mb-4 text-center" style="color:var(--brand-text);font-family:var(--brand-font-heading)">How was your experience?</h3>
        <div class="flex items-center justify-between mb-4 px-2">
          <span class="text-[14px] font-medium" style="color:var(--brand-text)">Food:</span>
          <div class="flex gap-1 text-yellow-400 text-[24px]">
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
          </div>
        </div>
        <div class="flex items-center justify-between mb-4 px-2">
          <span class="text-[14px] font-medium" style="color:var(--brand-text)">Delivery:</span>
          <div class="flex gap-1 text-yellow-400 text-[24px]">
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
            <i class="ti ti-star-filled cursor-pointer hover:scale-110 transition-transform"></i>
          </div>
        </div>
        <textarea placeholder="Leave a comment (optional)..." class="w-full h-20 p-3 border text-[13px] outline-none resize-none mb-4" style="background:var(--brand-surface-raised);border-color:var(--brand-border);border-radius:var(--brand-radius-sm);color:var(--brand-text)"></textarea>
        <button onclick="submitFeedback()" class="w-full h-[44px] text-white font-medium text-[14px] active:scale-[0.97] transition-all" style="background:var(--brand-primary);border-radius:var(--brand-radius-btn)">
          Submit Rating
        </button>
      </div>

    </main>

    <!-- Sticky Bottom -->
    <div class="embed-hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t p-4 z-40" style="background:var(--brand-surface);border-color:var(--brand-border)">
      <a href="02-cart.html" class="w-full h-[48px] flex items-center justify-center gap-2 border font-medium transition-all active:scale-[0.97]" style="border-color:var(--brand-primary);color:var(--brand-primary);background:var(--brand-primary-light);border-radius:var(--brand-radius-btn)">
        <i class="ti ti-reload text-[18px]"></i> Order again
      </a>
    </div>

  </div>

  <script>
    if (window.location.search.includes('embed=true')) { document.body.classList.add('embed-mode'); }
    const PRESETS = {
      "Food Dark":       { "--brand-primary":"#ea4f16","--brand-primary-hover":"#ffa12e","--brand-primary-light":"rgba(234,79,22,0.12)","--brand-accent":"#2a2a2a","--brand-bg":"#121212","--brand-surface":"#1e1e1e","--brand-surface-raised":"#2a2a2a","--brand-text":"#ffffff","--brand-text-muted":"#a8a8a8","--brand-border":"#2c2c2c","--brand-font-heading":"'Inter',sans-serif","--brand-font-body":"'Inter',sans-serif","--brand-radius":"12px","--brand-radius-sm":"8px","--brand-radius-btn":"78px" },
      "Crimson Classic": { "--brand-primary":"#C1121F","--brand-primary-hover":"#9B0D17","--brand-primary-light":"#FFF0F1","--brand-accent":"#F5F0E8","--brand-bg":"#FFFFFF","--brand-surface":"#F8F9FA","--brand-surface-raised":"#F0F0F0","--brand-text":"#1A1A1A","--brand-text-muted":"#6B7280","--brand-border":"#E5E7EB","--brand-font-heading":"'DM Serif Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"12px","--brand-radius-sm":"6px","--brand-radius-btn":"24px" },
      "Ocean Fresh":     { "--brand-primary":"#0D9488","--brand-primary-hover":"#0A7567","--brand-primary-light":"#F0FDFA","--brand-accent":"#F0F9F8","--brand-bg":"#FFFFFF","--brand-surface":"#F8FFFE","--brand-surface-raised":"#E0F7F5","--brand-text":"#134E4A","--brand-text-muted":"#6B7280","--brand-border":"#CCFBF1","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"24px","--brand-radius-sm":"12px","--brand-radius-btn":"32px" },
      "Midnight Urban":  { "--brand-primary":"#F97316","--brand-primary-hover":"#EA6A0A","--brand-primary-light":"rgba(249,115,22,0.10)","--brand-accent":"#1E1E1E","--brand-bg":"#111111","--brand-surface":"#1C1C1C","--brand-surface-raised":"#2a2a2a","--brand-text":"#F5F5F5","--brand-text-muted":"#9CA3AF","--brand-border":"#2D2D2D","--brand-font-heading":"'DM Sans',sans-serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"4px","--brand-radius-sm":"2px","--brand-radius-btn":"4px" },
      "Sage Garden":     { "--brand-primary":"#4D7C0F","--brand-primary-hover":"#3F6812","--brand-primary-light":"#F7FEE7","--brand-accent":"#ECFCCB","--brand-bg":"#FFFFFF","--brand-surface":"#F7FEE7","--brand-surface-raised":"#E8F5E0","--brand-text":"#1A2E05","--brand-text-muted":"#6B7280","--brand-border":"#D9F99D","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" },
      "Royal Gold":      { "--brand-primary":"#B45309","--brand-primary-hover":"#92400E","--brand-primary-light":"rgba(180,83,9,0.10)","--brand-accent":"#1C1400","--brand-bg":"#0D0900","--brand-surface":"#1A1200","--brand-surface-raised":"#2a2000","--brand-text":"#FEF3C7","--brand-text-muted":"#D97706","--brand-border":"#2D2000","--brand-font-heading":"'Cormorant Garamond',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"2px","--brand-radius-sm":"1px","--brand-radius-btn":"2px" },
      "Coral Breeze":    { "--brand-primary":"#DB2777","--brand-primary-hover":"#BE185D","--brand-primary-light":"#FDF2F8","--brand-accent":"#FCE7F3","--brand-bg":"#FFFFFF","--brand-surface":"#FDF2F8","--brand-surface-raised":"#FDE8F0","--brand-text":"#500724","--brand-text-muted":"#9D174D","--brand-border":"#FBCFE8","--brand-font-heading":"'Playfair Display',serif","--brand-font-body":"'DM Sans',sans-serif","--brand-radius":"20px","--brand-radius-sm":"10px","--brand-radius-btn":"32px" }
    };
    const PRESET_NAMES = Object.keys(PRESETS);
    let currentThemeIdx = 0;
    function applyPreset(name) {
      const p = PRESETS[name] || PRESETS['Food Dark'];
      const r = document.documentElement.style;
      Object.entries(p).forEach(([k, v]) => r.setProperty(k, v));
    }
    function cycleTheme() { currentThemeIdx=(currentThemeIdx+1)%PRESET_NAMES.length; applyPreset(PRESET_NAMES[currentThemeIdx]); }
    const saved = localStorage.getItem('dos_mockup_theme');
    if (saved && PRESETS[saved]) { currentThemeIdx = PRESET_NAMES.indexOf(saved); applyPreset(saved); } else applyPreset('Food Dark');

    let etaMinutes = 14;
    const etaDisplay = document.getElementById('eta-display');

    setInterval(() => {
      if (etaMinutes > 1) {
        etaMinutes--;
        etaDisplay.textContent = `~${etaMinutes} minutes`;
      } else {
        etaDisplay.textContent = `Arriving now!`;
      }
    }, 60000);

    const marker = document.getElementById('courier-marker');
    let x = 20, y = 80;
    setInterval(() => {
      if (x < 80) x += 1.5;
      if (y > 20) y -= 1.5;
      marker.style.left = `${x}%`;
      marker.style.bottom = `${y}%`;
    }, 3000);

    setTimeout(() => {
      const form = document.getElementById('feedback-form');
      form.classList.remove('hidden');
      setTimeout(() => form.classList.remove('opacity-0'), 50);
    }, 4000);

    function submitFeedback() {
      const form = document.getElementById('feedback-form');
      form.innerHTML = `
        <div class="flex flex-col items-center justify-center py-6">
          <i class="ti ti-heart-filled text-[48px] mb-3 animate-bounce" style="color:var(--brand-primary)"></i>
          <h3 class="text-[18px] font-bold" style="color:var(--brand-text)">Thank you!</h3>
          <p class="text-[13px] mt-1" style="color:var(--brand-text-muted)">Your feedback helps us improve.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
